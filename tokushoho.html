<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>特定商取引法に基づく表記 — とむSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #1a1612;
  --paper: #f7f3ee;
  --warm: #f0e8dc;
  --accent: #b87333;
  --muted: #8a7e72;
  --border: #ddd5c8;
  --surface: #ffffff;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  line-height: 1.8;
  min-height: 100vh;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1.2rem 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.header-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: 0.08em;
}
.header-logo span { color: var(--accent); }
main {
  max-width: 760px;
  margin: 3rem auto;
  padding: 0 1.5rem 4rem;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.06em;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 2px solid var(--accent);
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 2.5rem;
  font-size: 0.9rem;
}
th, td {
  padding: 1rem 1.2rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
th {
  width: 35%;
  background: var(--warm);
  font-weight: 400;
  color: var(--muted);
  white-space: nowrap;
}
td { background: var(--surface); }
.price-list { margin: 0; padding: 0; list-style: none; }
.price-list li { padding: 0.2rem 0; }
.price-label {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 0.75rem;
  padding: 0.1rem 0.5rem;
  border-radius: 3px;
  margin-right: 0.5rem;
  letter-spacing: 0.04em;
}
.back-link {
  display: inline-block;
  margin-top: 1rem;
  color: var(--accent);
  text-decoration: none;
  font-size: 0.9rem;
  border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
.back-link:hover { border-color: var(--accent); }
footer {
  background: var(--ink);
  color: var(--muted);
  text-align: center;
  padding: 2rem;
  font-size: 0.8rem;
}
</style>
</head>
<body>
<header>
  <a href="index.html" class="header-logo">とむ<span>SYSTEM</span></a>
</header>
<main>
  <h1>特定商取引法に基づく表記</h1>
  <table>
    <tr>
      <th>運営者・運営責任者</th>
      <td>[名前]</td>
    </tr>
    <tr>
      <th>所在地・電話番号</th>
      <td>請求があった場合には速やかに開示いたします</td>
    </tr>
    <tr>
      <th>メールアドレス</th>
      <td>Inverted.triangle.leef@gmail.com</td>
    </tr>
    <tr>
      <th>販売価格</th>
      <td>
        <ul class="price-list">
          <li><span class="price-label">ライト</span>月額 480円（税込）</li>
          <li><span class="price-label">スタンダード</span>月額 980円（税込）</li>
          <li><span class="price-label">フル</span>月額 1,480円（税込）</li>
        </ul>
      </td>
    </tr>
    <tr>
      <th>支払方法</th>
      <td>クレジットカード（Stripe決済）</td>
    </tr>
    <tr>
      <th>サービス提供時期</th>
      <td>決済完了後即時</td>
    </tr>
    <tr>
      <th>返金・キャンセル</th>
      <td>月途中のキャンセルによる返金は行いません</td>
    </tr>
  </table>
  <a href="index.html" class="back-link">← トップページに戻る</a>
</main>
<footer>© 2026 とむSYSTEM. All rights reserved.</footer>
</body>
</html>
