<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>要約＋返信セット | tomuSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #ede8df;
    --surface: #faf7f2;
    --surface2: #f0ebe0;
    --border: #d8d0c0;
    --border2: #c4b89a;
    --accent: #c8a84b;
    --accent2: #a8882e;
    --text: #2a2520;
    --text2: #6b6050;
    --text3: #9a8f7a;
    --dark-btn: #1e1a15;
    --green: #4a8c5c;
    --red: #c05040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
  }

  /* ─── ヘッダー ─── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .app-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent2);
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }

  .app-title-header {
    font-size: 15px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.02em;
  }

  /* ─── メイン ─── */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ─── タイトル ─── */
  .page-title {
    margin-bottom: 36px;
  }

  .page-title h1 {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 8px;
  }

  .page-title p {
    font-size: 13px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  /* ─── 入力エリア ─── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    min-height: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    line-height: 1.8;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  textarea:focus { border-color: var(--border2); }
  textarea::placeholder { color: var(--text3); }

  /* ─── 設定行 ─── */
  .options-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .option-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .option-label {
    font-size: 13px;
    color: var(--text2);
  }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    padding: 6px 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:hover { border-color: var(--border2); }

  /* ─── ボタン ─── */
  .btn-run {
    margin-left: auto;
    background: var(--dark-btn);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 32px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-run:hover { opacity: 0.85; }
  .btn-run:active { transform: scale(0.98); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── 結果グリッド ─── */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 640px) {
    .results-grid { grid-template-columns: 1fr; }
    .options-row { flex-direction: column; align-items: flex-start; }
    .btn-run { margin-left: 0; width: 100%; justify-content: center; }
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .card-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .card-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .dot-summary { background: var(--accent); }
  .dot-reply   { background: var(--text2); }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .copy-btn:hover { border-color: var(--border2); color: var(--text2); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .card-body {
    padding: 18px;
    min-height: 180px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ─── ローディング ─── */
  .loading-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px 20px;
  }
  .loading-state.show { display: flex; }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }

  /* ─── 空状態 ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 48px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 24px; opacity: 0.4; }
  .empty-text { font-family: 'DM Mono', monospace; font-size: 12px; }

  /* ─── エラー ─── */
  .error-banner {
    display: none;
    background: rgba(192,80,64,0.08);
    border: 1px solid rgba(192,80,64,0.3);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 20px;
  }
  .error-banner.show { display: block; }

  /* ─── ストリーミングカーソル ─── */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor::after {
    content: '▋';
    font-size: 0.8em;
    animation: blink 0.9s step-end infinite;
    color: var(--accent);
  }

  /* ─── フッター ─── */
  footer {
    text-align: center;
    padding: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    letter-spacing: 0.05em;
  }
</style>
  <script src="/common/header.js"></script>
</head>
<body>

<header>
  <span class="app-badge">STANDARD</span>
  <span class="app-title-header">長文メール・資料 要約＋返信セット</span>
</header>

<div class="container">

  <div class="page-title">
    <h1>長文メール・資料<br>要約 ＋ 返信セット</h1>
    <p>// paste your email or document → get summary + reply draft</p>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="section-label">入力テキスト</div>
  <textarea
    id="inputText"
    placeholder="メール本文・資料・議事録などをここに貼り付けてください。&#10;&#10;長文でも対応できます。"
  ></textarea>

  <div class="options-row">
    <div class="option-group">
      <span class="option-label">要約の長さ</span>
      <select id="summaryLength">
        <option value="short">3行以内</option>
        <option value="medium" selected>5〜7行</option>
        <option value="long">詳細（箇条書き）</option>
      </select>
    </div>
    <div class="option-group">
      <span class="option-label">返信トーン</span>
      <select id="replyTone">
        <option value="formal" selected>丁寧・フォーマル</option>
        <option value="casual">カジュアル</option>
        <option value="assertive">簡潔・ビジネスライク</option>
      </select>
    </div>
    <div class="option-group">
      <span class="option-label">返信タイプ</span>
      <select id="replyType">
        <option value="accept" selected>承諾・了解</option>
        <option value="decline">お断り・辞退</option>
        <option value="pending">保留・確認中</option>
        <option value="question">質問・確認</option>
      </select>
    </div>
    <button class="btn-run" id="runBtn" onclick="runAnalysis()">
      ▶ 生成する
    </button>
  </div>

  <div class="results-grid">
    <!-- 要約カード -->
    <div class="result-card" id="summaryCard">
      <div class="card-header">
        <div class="card-title">
          <span class="dot dot-summary"></span>
          SUMMARY — 要約
        </div>
        <button class="copy-btn" id="copySum" onclick="copyText('summaryOutput', 'copySum')">COPY</button>
      </div>
      <div class="card-body" id="summaryOutput">
        <div class="empty-state">
          <div class="empty-icon">◎</div>
          <div class="empty-text">要約がここに表示されます</div>
        </div>
      </div>
    </div>

    <!-- 返信カード -->
    <div class="result-card" id="replyCard">
      <div class="card-header">
        <div class="card-title">
          <span class="dot dot-reply"></span>
          REPLY — 返信案
        </div>
        <button class="copy-btn" id="copyRep" onclick="copyText('replyOutput', 'copyRep')">COPY</button>
      </div>
      <div class="card-body" id="replyOutput">
        <div class="empty-state">
          <div class="empty-icon">◎</div>
          <div class="empty-text">返信案がここに表示されます</div>
        </div>
      </div>
    </div>
  </div>

</div>

<footer>とむSYSTEM © 2025 &nbsp;|&nbsp; Standard プラン専用</footer>

<!-- tomu-login.js 認証 -->
<script src="https://tomu-ai963.github.io/tomu-system/tomu-login.js"></script>

<script>
const WORKER_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev';

const SUMMARY_LENGTH_MAP = {
  short:  '3行以内で簡潔に',
  medium: '5〜7行程度で',
  long:   '箇条書きで詳細に（5〜10項目）'
};

const REPLY_TONE_MAP = {
  formal:    '丁寧でフォーマルなビジネス文体で',
  casual:    'カジュアルで親しみやすい文体で',
  assertive: '簡潔で要点のみ伝えるビジネスライクな文体で'
};

const REPLY_TYPE_MAP = {
  accept:   '承諾・了解の返信',
  decline:  'お断り・辞退の返信',
  pending:  '保留・確認中の返信',
  question: '不明点を質問・確認する返信'
};

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function setCardLoading(outputId) {
  const output = document.getElementById(outputId);
  output.innerHTML = `<div class="loading-state show"><div class="spinner"></div><div class="loading-text">生成中...</div></div>`;
}

function setCardContent(outputId, text) {
  const output = document.getElementById(outputId);
  output.textContent = '';
  output.classList.add('cursor');
  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      output.textContent += text[i++];
    } else {
      clearInterval(interval);
      output.classList.remove('cursor');
    }
  }, 8);
}

async function callWorker(systemPrompt, userContent) {
  const res = await fetch(`${WORKER_URL}/api/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: systemPrompt,
      messages: [{ role: 'user', content: userContent }]
    })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.content?.[0]?.text || data.text || '';
}

async function runAnalysis() {
  const inputText = document.getElementById('inputText').value.trim();
  if (!inputText) {
    showError('テキストを入力してください。');
    return;
  }

  const summaryLength = document.getElementById('summaryLength').value;
  const replyTone = document.getElementById('replyTone').value;
  const replyType = document.getElementById('replyType').value;

  const btn = document.getElementById('runBtn');
  btn.disabled = true;

  setCardLoading('summaryOutput');
  setCardLoading('replyOutput');

  const summaryPrompt = `あなたは優秀なビジネスアシスタントです。
与えられたメール・文書の内容を${SUMMARY_LENGTH_MAP[summaryLength]}要約してください。
要点を漏らさず、簡潔・明瞭にまとめてください。
返答は要約内容のみ出力し、前置きや説明は不要です。`;

  const replyPrompt = `あなたは優秀なビジネスアシスタントです。
以下のメール・文書に対する「${REPLY_TYPE_MAP[replyType]}」を作成してください。
文体：${REPLY_TONE_MAP[replyTone]}
件名・宛先・署名は含めず、本文のみ出力してください。
前置きや説明は不要です。`;

  try {
    const [summary, reply] = await Promise.all([
      callWorker(summaryPrompt, inputText),
      callWorker(replyPrompt, inputText)
    ]);

    setCardContent('summaryOutput', summary);
    setCardContent('replyOutput', reply);

  } catch (err) {
    showError('エラーが発生しました。もう一度お試しください。');
    document.getElementById('summaryOutput').innerHTML = `<div class="empty-state"><div class="empty-text">エラー</div></div>`;
    document.getElementById('replyOutput').innerHTML = `<div class="empty-state"><div class="empty-text">エラー</div></div>`;
  } finally {
    btn.disabled = false;
  }
}

async function copyText(outputId, btnId) {
  const text = document.getElementById(outputId).textContent;
  if (!text || text.includes('表示されます') || text.includes('エラー')) return;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById(btnId);
  btn.textContent = 'COPIED';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = 'COPY';
    btn.classList.remove('copied');
  }, 2000);
}

document.getElementById('inputText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) runAnalysis();
});
</script>
</body>
</html>
