<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>要約＋返信セット | tomuSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #ede8df;
    --surface: #faf7f2;
    --surface2: #f0ebe0;
    --border: #d8d0c0;
    --border2: #c4b89a;
    --accent: #c8a84b;
    --accent2: #a8882e;
    --text: #2a2520;
    --text2: #6b6050;
    --text3: #9a8f7a;
    --dark-btn: #1e1a15;
    --green: #4a8c5c;
    --red: #c05040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
  }

  /* ─── ヘッダー ─── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .app-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent2);
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }

  .app-title-header {
    font-size: 15px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.02em;
  }

  /* ─── メイン ─── */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ─── タイトル ─── */
  .page-title {
    margin-bottom: 36px;
  }

  .page-title h1 {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 8px;
  }

  .page-title p {
    font-size: 13px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  /* ─── 入力エリア ─── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    min-height: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    line-height: 1.8;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  textarea:focus { border-color: var(--border2); }
  textarea::placeholder { color: var(--text3); }

  /* ─── 設定行 ─── */
  .options-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .option-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .option-label {
    font-size: 13px;
    color: var(--text2);
  }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    padding: 6px 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:hover { border-color: var(--border2); }

  /* ─── ボタン ─── */
  .btn-run {
    margin-left: auto;
    background: var(--dark-btn);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 32px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-run:hover { opacity: 0.85; }
  .btn-run:active { transform: scale(0.98); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── 結果グリッド ─── */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 640px) {
    .results-grid { grid-template-columns: 1fr; }
    .options-row { flex-direction: column; align-items: flex-start; }
    .btn-run { margin-left: 0; width: 100%; justify-content: center; }
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .card-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .card-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .dot-summary { background: var(--accent); }
  .dot-reply   { background: var(--text2); }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .copy-btn:hover { border-color: var(--border2); color: var(--text2); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .card-body {
    padding: 18px;
    min-height: 180px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ─── ローディング ─── */
  .loading-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px 20px;
  }
  .loading-state.show { display: flex; }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }

  /* ─── 空状態 ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 48px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 24px; opacity: 0.4; }
  .empty-text { font-family: 'DM Mono', monospace; font-size: 12px; }

  /* ─── エラー ─── */
  .error-banner {
    display: none;
    background: rgba(192,80,64,0.08);
    border: 1px solid rgba(192,80,64,0.3);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 20px;
  }
  .error-banner.show { display: block; }

  /* ─── ストリーミングカーソル ─── */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor::after {
    content: '▋';
    font-size: 0.8em;
    animation: blink 0.9s step-end infinite;
    color: var(--accent);
  }

  /* ─── フッター ─── */
  footer {
    text-align: center;
    padding: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    letter-spacing: 0.05em;
  }

/* ===== MYSTIC SECTION ===== */
.mystic-section{margin-top:20px;padding-top:16px;border-top:1px solid rgba(212,175,55,0.2);}
.btn-mystic{width:100%;background:linear-gradient(135deg,#1a0533,#0d1f3c);color:#d4af37;border:1px solid #d4af37;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;transition:opacity 0.2s,transform 0.1s;font-family:inherit;letter-spacing:0.05em;margin-top:8px;}
.btn-mystic:hover{opacity:0.85;transform:translateY(-1px);}
.btn-mystic:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.mystic-result-card{margin-top:12px;background:linear-gradient(135deg,rgba(26,5,51,0.95),rgba(13,31,60,0.95));border:1px solid rgba(212,175,55,0.4);border-radius:8px;padding:18px 20px;color:#e8d5a3;font-size:0.88rem;line-height:1.9;white-space:pre-wrap;max-height:none;overflow:visible;}
.mystic-result-label{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:#d4af37;margin-bottom:10px;}

/* ===== Supabase 履歴（Fullプラン限定） ===== */
.hist-section{width:100%;margin:16px auto 0;padding:16px 18px;border-radius:12px;background:var(--surface,#fff);border:1px solid var(--border,rgba(0,0,0,0.1));}
.hist-head{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent,var(--gold,#b87333));margin-bottom:10px;font-family:monospace;}
.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-card{padding:11px 13px;border-radius:9px;background:var(--bg,var(--paper,var(--cream,#f7f3ee)));border:1px solid var(--border,rgba(0,0,0,0.08));cursor:pointer;transition:background 0.2s,border-color 0.2s;}
.hist-card:hover{border-color:var(--accent,var(--gold,#b87333));}
.hist-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.hist-card-date{font-size:0.66rem;font-family:monospace;opacity:0.55;color:var(--muted,var(--text-sub,#8a7e72));}
.hist-card-title{font-size:0.88rem;font-weight:600;margin-bottom:2px;color:var(--ink,var(--text,#1a1612));}
.hist-card-summary{font-size:0.75rem;color:var(--muted,var(--text-sub,#8a7e72));line-height:1.5;}
.hist-del{margin-left:auto;background:none;border:none;font-size:0.9rem;cursor:pointer;opacity:0.3;transition:opacity 0.2s;padding:1px 4px;border-radius:4px;}
.hist-del:hover{opacity:1;}
.hist-empty{font-size:0.75rem;color:var(--muted,var(--text-sub,#8a7e72));font-family:monospace;text-align:center;padding:12px 0;opacity:0.7;}
.hist-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.hist-modal{background:var(--surface,#fff);border-radius:16px;padding:22px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.25);border:1px solid var(--border,rgba(0,0,0,0.1));}
.hist-modal-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border,rgba(0,0,0,0.08));}
.hist-modal-date{font-size:0.66rem;font-family:monospace;opacity:0.55;margin-bottom:3px;color:var(--muted,var(--text-sub,#8a7e72));}
.hist-modal-title{font-size:1.1rem;font-weight:700;color:var(--ink,var(--text,#1a1612));}
.hist-modal-meta{font-size:0.7rem;color:var(--muted,var(--text-sub,#8a7e72));margin-top:3px;}
.hist-modal-close{margin-left:auto;background:none;border:1px solid var(--border,rgba(0,0,0,0.12));border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:0.84rem;color:var(--muted,var(--text-sub,#8a7e72));display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}
.hist-modal-close:hover{background:var(--bg,rgba(0,0,0,0.04));}
.hist-modal-body{font-size:0.9rem;line-height:1.85;white-space:pre-wrap;color:var(--ink,var(--text,#1a1612));}

<div id="hist-section" class="hist-section" style="display:none;max-width:560px;">
  <div class="hist-head">Past Sessions — 履歴</div>
  <div id="hist-list" class="hist-list"></div>
</div>
<div id="hist-modal" class="hist-modal-overlay" style="display:none;" onclick="histClose(event)">

    <div class="hist-modal-hdr">
      <div style="flex:1"><div class="hist-modal-date" id="hist-modal-date"></div><div class="hist-modal-title" id="hist-modal-title"></div><div class="hist-modal-meta" id="hist-modal-meta"></div></div>

<script>
(function(){
const A='summarize-reply',W='https://orange-sound-354b.inverted-triangle-leef.workers.dev';
let _s=[];
function _isFull(){return !!(window.TomuAuth&&TomuAuth.getPlan&&TomuAuth.getPlan()==='full');}
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.histLoad=async function(){if(!_isFull()){const sec=document.getElementById('hist-section');if(sec)sec.style.display='none';return;}const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?app_id='+A+'&limit=5',{headers:{'X-Customer-Email':em}});const d=await r.json();_s=d.sessions||[];histRender(_s);}catch(x){}};
window.histRender=function(ss){const sec=document.getElementById('hist-section');const li=document.getElementById('hist-list');if(!sec||!li)return;if(!_isFull()){sec.style.display='none';return;}if(!ss.length){li.innerHTML='<p class="hist-empty">まだ履歴がありません</p>';sec.style.display='';return;}li.innerHTML=ss.map((s,i)=>{const sd=s.session_data||{},dt=new Date(s.created_at).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});return'<div class="hist-card" onclick="histOpen('+i+')"><div class="hist-card-meta"><span class="hist-card-date">'+dt+'</span><button class="hist-del" onclick="event.stopPropagation();histDel(\''+_e(s.id)+'\')">🗑</button></div><div class="hist-card-title">'+_e(sd.title||'—')+'</div>'+(sd.summary?'<div class="hist-card-summary">'+_e(sd.summary)+'</div>':'')+'</div>';}).join('');sec.style.display='';};
window.histOpen=function(i){const s=_s[i];if(!s)return;const sd=s.session_data||{};document.getElementById('hist-modal-date').textContent=new Date(s.created_at).toLocaleDateString('ja-JP',{year:'numeric',month:'numeric',day:'numeric'});document.getElementById('hist-modal-title').textContent=sd.title||'—';document.getElementById('hist-modal-meta').textContent=sd.meta||'';document.getElementById('hist-modal-body').textContent=sd.content||'';document.getElementById('hist-modal').style.display='flex';document.body.style.overflow='hidden';};
window.histClose=function(e){if(e&&e.target!==document.getElementById('hist-modal'))return;document.getElementById('hist-modal').style.display='none';document.body.style.overflow='';};
window.histDel=async function(id){if(!id||!confirm('この履歴を削除しますか？'))return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?id='+encodeURIComponent(id),{method:'DELETE',headers:{'X-Customer-Email':em}});if(r.ok)await histLoad();else alert('削除に失敗しました。');}catch(x){alert('通信エラー');}};
window.histSave=async function(d){if(!_isFull())return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{await fetch(W+'/api/history',{method:'POST',headers:{'Content-Type':'application/json','X-Customer-Email':em},body:JSON.stringify({app_id:A,session_data:d})});}catch(x){}};
document.addEventListener('DOMContentLoaded',function(){setTimeout(histLoad,800);});
document.addEventListener('tomu:unlocked',function(){setTimeout(histLoad,300);});
})();
</script>

<script>
const WORKER_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev';

const SUMMARY_LENGTH_MAP = {
  short:  '3行以内で簡潔に',
  medium: '5〜7行程度で',
  long:   '箇条書きで詳細に（5〜10項目）'
};

const REPLY_TONE_MAP = {
  formal:    '丁寧でフォーマルなビジネス文体で',
  casual:    'カジュアルで親しみやすい文体で',
  assertive: '簡潔で要点のみ伝えるビジネスライクな文体で'
};

const REPLY_TYPE_MAP = {
  accept:   '承諾・了解の返信',
  decline:  'お断り・辞退の返信',
  pending:  '保留・確認中の返信',
  question: '不明点を質問・確認する返信'
};

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function setCardLoading(outputId) {
  const output = document.getElementById(outputId);
  output.innerHTML = `<div class="loading-state show"><div class="spinner"></div><div class="loading-text">生成中...</div></div>`;
}

function setCardContent(outputId, text) {
  const output = document.getElementById(outputId);
  output.textContent = '';
  output.classList.add('cursor');
  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      output.textContent += text[i++];
    } else {
      clearInterval(interval);
      output.classList.remove('cursor');
    }
  }, 8);
}

async function callWorker(systemPrompt, userContent) {
  const res = await fetch(`${WORKER_URL}/api/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: systemPrompt,
      messages: [{ role: 'user', content: userContent }]
    })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.content?.[0]?.text || data.text || '';
}

async function runAnalysis() {
  const inputText = document.getElementById('inputText').value.trim();
  if (!inputText) {
    showError('テキストを入力してください。');
    return;
  }

  const summaryLength = document.getElementById('summaryLength').value;
  const replyTone = document.getElementById('replyTone').value;
  const replyType = document.getElementById('replyType').value;

  const btn = document.getElementById('runBtn');
  btn.disabled = true;

  setCardLoading('summaryOutput');
  setCardLoading('replyOutput');

  const summaryPrompt = `あなたは優秀なビジネスアシスタントです。
与えられたメール・文書の内容を${SUMMARY_LENGTH_MAP[summaryLength]}要約してください。
要点を漏らさず、簡潔・明瞭にまとめてください。
返答は要約内容のみ出力し、前置きや説明は不要です。`;

  const replyPrompt = `あなたは優秀なビジネスアシスタントです。
以下のメール・文書に対する「${REPLY_TYPE_MAP[replyType]}」を作成してください。
文体：${REPLY_TONE_MAP[replyTone]}
件名・宛先・署名は含めず、本文のみ出力してください。
前置きや説明は不要です。`;

  try {
    const [summary, reply] = await Promise.all([
      callWorker(summaryPrompt, inputText),
      callWorker(replyPrompt, inputText)
    ]);

    setCardContent('summaryOutput', summary);
    setCardContent('replyOutput', reply);
    if((summary||reply)&&window.histSave){histSave({title:'メール要約・返信',summary:String(summary).replace(/[#*>-]+/g,' ').slice(0,80),content:'【要約】\n'+(summary||'')+'\n\n【返信案】\n'+(reply||''),meta:''});setTimeout(histLoad,1000);}
    document.getElementById('mystic-wrap').style.display = 'block';

  } catch (err) {
    showError('エラーが発生しました。もう一度お試しください。');
    document.getElementById('summaryOutput').innerHTML = `<div class="empty-state"><div class="empty-text">エラー</div></div>`;
    document.getElementById('replyOutput').innerHTML = `<div class="empty-state"><div class="empty-text">エラー</div></div>`;
  } finally {
    btn.disabled = false;
  }
}

async function copyText(outputId, btnId) {
  const text = document.getElementById(outputId).textContent;
  if (!text || text.includes('表示されます') || text.includes('エラー')) return;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById(btnId);
  btn.textContent = 'COPIED';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = 'COPY';
    btn.classList.remove('copied');
  }, 2000);
}

document.getElementById('inputText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) runAnalysis();
});

async function callMystic(tool, args) {
  const MYSTIC_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev/mystic-bridge';
  const btn = document.querySelector('.btn-mystic');
  const wrap = document.getElementById('mystic-result');
  btn.disabled = true;
  btn.textContent = '✨ 星々に問いかけています…';
  wrap.innerHTML = '<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC</div>星々があなたのために語ります...</div>';
  try {
    const res = await fetch(MYSTIC_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ tool: tool, arguments: args })
    });
    const data = await res.json();
    const msg = (data.content && data.content[0] && data.content[0].text) || '占い結果を取得できませんでした。';
    const safe = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    wrap.innerHTML = `<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC より</div>${safe}</div>`;
  } catch(e) {
    wrap.innerHTML = '<div class="mystic-result-card">⚠ 星々との通信が途絶えました。しばらくしてからお試しください。</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ MYSTICで占う';
  }
}
