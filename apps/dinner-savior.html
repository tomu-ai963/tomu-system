<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晩御飯の救世主 — とむSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400;500&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1612;
  --paper: #f7f3ee;
  --warm: #f0e8dc;
  --accent: #b87333;
  --accent2: #7a9e7e;
  --muted: #8a7e72;
  --border: #ddd5c8;
  --surface: #ffffff;
  --light-accent: #eedfc8;

  /* 夜のキッチン追加色 */
  --night: #0f0c08;
  --ember: #c8682a;
  --ember-glow: #e8884a;
  --steam: rgba(248,240,228,0.08);
  --flame: #d4863c;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  min-height: 100vh;
  background: var(--night);
  color: var(--paper);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  line-height: 1.8;
  overflow-x: hidden;
  position: relative;
}

/* ノイズテクスチャ */
body::before {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* 焚き火グロー背景 */
body::after {
  content:'';
  position:fixed;
  bottom: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 80vw;
  height: 60vh;
  background: radial-gradient(ellipse at center bottom, rgba(200,104,42,0.18) 0%, rgba(180,70,20,0.08) 40%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: emberPulse 4s ease-in-out infinite;
}

@keyframes emberPulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleY(1); }
  50% { opacity: 1; transform: translateX(-50%) scaleY(1.08); }
}

/* ===== NAV ===== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(15,12,8,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(184,115,51,0.2);
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--paper);
  text-decoration: none;
}
.nav-logo span { color: var(--accent); }

.nav-badge {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid rgba(184,115,51,0.3);
  padding: 4px 12px;
  border-radius: 20px;
}

/* ===== MAIN ===== */
main {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 24px 60px;
}

/* ===== HERO ===== */
.hero {
  text-align: center;
  margin-bottom: 56px;
  animation: fadeUp 0.9s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}

.hero-icon {
  font-size: 3.2rem;
  display: block;
  margin-bottom: 20px;
  animation: iconFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(200,104,42,0.5));
}

@keyframes iconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.hero-title {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 800;
  letter-spacing: 0.05em;
  color: var(--paper);
  line-height: 1.2;
  margin-bottom: 12px;
}

.hero-title .accent { color: var(--ember-glow); }

.hero-sub {
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.hero-desc {
  font-size: 0.95rem;
  color: rgba(247,243,238,0.6);
  max-width: 380px;
  margin: 0 auto;
  line-height: 1.9;
}

/* ===== CARD ===== */
.card {
  width: 100%;
  max-width: 480px;
  background: rgba(247,243,238,0.04);
  border: 1px solid rgba(184,115,51,0.25);
  border-radius: 4px;
  padding: 40px 36px;
  backdrop-filter: blur(8px);
  animation: fadeUp 0.9s ease 0.2s both;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--ember), transparent);
}

/* 食材入力エリア */
.ingredients-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: center;
  margin-bottom: 28px;
}

.ing-field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ing-label {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ember-glow);
  font-weight: 400;
}

.ing-input {
  background: rgba(247,243,238,0.06);
  border: 1px solid rgba(184,115,51,0.3);
  border-radius: 2px;
  padding: 14px 16px;
  color: var(--paper);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  font-weight: 300;
  width: 100%;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  text-align: center;
}

.ing-input::placeholder { color: rgba(247,243,238,0.25); }

.ing-input:focus {
  border-color: var(--ember);
  background: rgba(184,115,51,0.08);
}

.plus-divider {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  color: var(--ember);
  opacity: 0.6;
  text-align: center;
  margin-top: 22px;
}

/* ===== ボタン ===== */
.btn-generate {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid var(--ember);
  border-radius: 2px;
  color: var(--ember-glow);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.btn-generate::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--ember);
  opacity: 0;
  transition: opacity 0.3s;
}

.btn-generate:hover::before { opacity: 0.12; }
.btn-generate:hover { letter-spacing: 0.3em; border-color: var(--ember-glow); }
.btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-generate:disabled:hover::before { opacity: 0; }
.btn-generate:disabled:hover { letter-spacing: 0.25em; }

.btn-text { position: relative; z-index: 1; }

/* ===== 結果エリア ===== */
.result-area {
  margin-top: 32px;
  padding-top: 28px;
  border-top: 1px solid rgba(184,115,51,0.15);
  display: none;
  animation: fadeUp 0.5s ease both;
}

.result-area.visible { display: block; }

.result-label {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ember);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.result-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(184,115,51,0.2);
}

.result-text {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.05rem;
  font-weight: 400;
  color: var(--paper);
  line-height: 2;
  white-space: pre-wrap;
}

/* ローディング */
.loading-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  padding: 12px 0;
}

.loading-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ember);
  animation: dotBounce 1.2s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* エラー */
.error-msg {
  font-size: 0.82rem;
  color: #e07070;
  padding: 12px;
  border: 1px solid rgba(224,112,112,0.3);
  border-radius: 2px;
  background: rgba(224,112,112,0.05);
}

/* ===== TIPS ===== */
.tips-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.tip-chip {
  font-size: 0.7rem;
  color: var(--muted);
  border: 1px solid rgba(138,126,114,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.tip-chip:hover {
  border-color: var(--ember);
  color: var(--ember-glow);
  background: rgba(184,115,51,0.06);
}

/* ===== FOOTER ===== */
footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 24px;
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  color: rgba(138,126,114,0.5);
}

footer a {
  color: rgba(184,115,51,0.5);
  text-decoration: none;
  transition: color 0.2s;
}

footer a:hover { color: var(--accent); }

/* ===== RESPONSIVE ===== */
@media (max-width: 520px) {
  .card { padding: 28px 20px; }
  nav { padding: 16px 20px; }
  .ingredients-row { grid-template-columns: 1fr auto 1fr; gap: 8px; }
  .ing-input { padding: 12px 10px; font-size: 0.9rem; }
}
</style>
  <script src="/tomu-system/common/header.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">とむ<span>SYSTEM</span></a>
  <span class="nav-badge">App 10 / 10</span>
</nav>

<main>
  <div class="hero">
    <span class="hero-icon">🍳</span>
    <p class="hero-sub">Tomu System — App 10</p>
    <h1 class="hero-title">晩御飯の<span class="accent">救世主</span></h1>
    <p class="hero-desc">冷蔵庫に残った食材を2つ入れるだけ。<br>今夜の献立を即決します。</p>
  </div>

  <div class="card">
    <div class="ingredients-row">
      <div class="ing-field">
        <label class="ing-label">食材①</label>
        <input class="ing-input" id="ing1" type="text" placeholder="例：豆腐" maxlength="20">
      </div>
      <div class="plus-divider">+</div>
      <div class="ing-field">
        <label class="ing-label">食材②</label>
        <input class="ing-input" id="ing2" type="text" placeholder="例：卵" maxlength="20">
      </div>
    </div>

    <!-- サジェストチップ -->
    <div class="tips-row" id="tips">
      <span class="tip-chip" onclick="fillExample('鶏肉','玉ねぎ')">🐔 鶏肉 × 玉ねぎ</span>
      <span class="tip-chip" onclick="fillExample('豆腐','ひき肉')">🫘 豆腐 × ひき肉</span>
      <span class="tip-chip" onclick="fillExample('ジャガイモ','バター')">🥔 じゃがいも × バター</span>
      <span class="tip-chip" onclick="fillExample('キャベツ','豚バラ')">🥬 キャベツ × 豚バラ</span>
    </div>

    <button class="btn-generate" id="btn" onclick="generate()" style="margin-top:24px;">
      <span class="btn-text">今夜の献立を決める</span>
    </button>

    <div class="result-area" id="result">
      <div class="result-label">今夜はこれで決まり</div>
      <div class="result-text" id="result-text"></div>
    </div>
  </div>
</main>

<footer>
  <a href="index.html">← とむSYSTEM</a>
  &nbsp;·&nbsp;
  Powered by Claude Haiku × Cloudflare Workers
</footer>

<script>
const WORKER_URL = "https://orange-sound-354b.inverted-triangle-leef.workers.dev/";

function fillExample(a, b) {
  document.getElementById('ing1').value = a;
  document.getElementById('ing2').value = b;
  document.getElementById('ing1').focus();
}

async function generate() {
  const ing1 = document.getElementById('ing1').value.trim();
  const ing2 = document.getElementById('ing2').value.trim();

  if (!ing1 || !ing2) {
    shakeCard();
    return;
  }

  const btn = document.getElementById('btn');
  const resultArea = document.getElementById('result');
  const resultText = document.getElementById('result-text');

  // ローディング状態
  btn.disabled = true;
  btn.querySelector('.btn-text').textContent = '考え中...';
  resultArea.classList.add('visible');
  resultText.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        appType: 'dinner',
        input: `食材1: ${ing1}、食材2: ${ing2}`,
        email: TomuAuth.getEmail()
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (err.error === 'subscription_required' || err.error === 'login_required') {
        TomuAuth.showOverlay();
        return;
      }
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error);
    }

    // 結果表示（タイプライター風）
    const text = data.result || '提案を生成できませんでした。';
    typewrite(resultText, text);

  } catch (err) {
    resultText.innerHTML = `<div class="error-msg">⚠ 通信エラーが発生しました。<br>しばらくしてからもう一度お試しください。<br><small>${err.message}</small></div>`;
  } finally {
    btn.disabled = false;
    btn.querySelector('.btn-text').textContent = 'もう一度考える';
  }
}

function typewrite(el, text) {
  el.textContent = '';
  let i = 0;
  const interval = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 28);
}

function shakeCard() {
  const card = document.querySelector('.card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'shake 0.4s ease';
  setTimeout(() => { card.style.animation = ''; }, 400);
}

// キーボードショートカット
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (document.activeElement.id === 'ing1' || document.activeElement.id === 'ing2')) {
    generate();
  }
});

// shakeアニメ定義
const style = document.createElement('style');
style.textContent = `
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}`;
document.head.appendChild(style);
</script>

<!-- とむSYSTEM 共通認証モジュール -->
<script src="../tomu-login.js"></script>
</body>
</html>
