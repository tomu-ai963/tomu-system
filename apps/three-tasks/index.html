<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三行タスク整理 — とむSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1612;
  --paper: #f7f3ee;
  --warm: #f0e8dc;
  --accent: #b87333;
  --accent2: #7a9e7e;
  --muted: #8a7e72;
  --border: #ddd5c8;
  --surface: #ffffff;
  --light-accent: #eedfc8;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px 80px;
}

/* ノイズ */
body::before {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ===== ヘッダー ===== */
header {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeUp 0.6s ease both;
}

.logo-link {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  display: block;
  margin-bottom: 20px;
}
.logo-link span { color: var(--accent); }

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 300;
  letter-spacing: 0.04em;
  line-height: 1.2;
  color: var(--ink);
}

h1 em {
  font-style: italic;
  color: var(--accent);
}

.subtitle {
  margin-top: 10px;
  font-size: 0.78rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}

/* ===== メインカード ===== */
.card {
  width: 100%;
  max-width: 640px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 40px;
  animation: fadeUp 0.6s 0.1s ease both;
  position: relative;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: var(--accent);
  border-radius: 2px 0 0 2px;
}

/* ===== テキストエリア ===== */
label {
  display: block;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  min-height: 160px;
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--ink);
  background: var(--paper);
  resize: vertical;
  transition: border-color 0.2s;
  line-height: 1.8;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
}

textarea::placeholder {
  color: var(--border);
  font-style: italic;
}

/* ===== ボタン ===== */
.btn-wrap {
  margin-top: 20px;
  display: flex;
  justify-content: flex-end;
}

button {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 400;
  color: var(--surface);
  background: var(--ink);
  border: none;
  padding: 14px 32px;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

button:hover {
  background: var(--accent);
  transform: translateY(-1px);
}

button:active { transform: translateY(0); }
button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ===== ローディング ===== */
.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}

button.loading .spinner { display: block; }
button.loading .btn-text { display: none; }

/* ===== 結果エリア ===== */
.result-area {
  margin-top: 32px;
  display: none;
  animation: fadeUp 0.4s ease both;
}

.result-label {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.result-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ===== タスクカード ===== */
.tasks-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 20px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 2px;
  animation: slideIn 0.3s ease both;
}

.task-item:nth-child(1) { animation-delay: 0.05s; }
.task-item:nth-child(2) { animation-delay: 0.12s; }
.task-item:nth-child(3) { animation-delay: 0.19s; }

.task-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  font-weight: 300;
  color: var(--accent);
  line-height: 1;
  min-width: 20px;
  padding-top: 2px;
}

.task-text {
  font-size: 0.9rem;
  font-weight: 300;
  line-height: 1.7;
  color: var(--ink);
  flex: 1;
}

.task-done {
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 3px;
  transition: all 0.2s;
  position: relative;
}

.task-done:hover { border-color: var(--accent2); }

.task-done.checked {
  background: var(--accent2);
  border-color: var(--accent2);
}

.task-done.checked::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 8px; height: 8px;
  background: white;
  border-radius: 50%;
}

.task-item.done .task-text {
  text-decoration: line-through;
  color: var(--muted);
}

/* ===== フッター ===== */
.card-footer {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.badge {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--warm);
  padding: 4px 10px;
  border-radius: 20px;
}

.retry-btn {
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 7px 18px;
  font-size: 0.68rem;
}

.retry-btn:hover { background: var(--warm); color: var(--ink); transform: none; }

/* ===== エラー ===== */
.error-msg {
  display: none;
  margin-top: 16px;
  padding: 12px 16px;
  background: #fff5f5;
  border: 1px solid #f5c6c6;
  border-radius: 2px;
  font-size: 0.82rem;
  color: #c0392b;
}

/* ===== footer ===== */
.page-footer {
  margin-top: 40px;
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  color: var(--border);
  text-transform: uppercase;
  animation: fadeUp 0.6s 0.2s ease both;
}

/* ===== アニメーション ===== */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== MYSTIC SECTION ===== */
.mystic-section{margin-top:20px;padding-top:16px;border-top:1px solid rgba(212,175,55,0.2);}
.btn-mystic{width:100%;background:linear-gradient(135deg,#1a0533,#0d1f3c);color:#d4af37;border:1px solid #d4af37;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;transition:opacity 0.2s,transform 0.1s;font-family:inherit;letter-spacing:0.05em;margin-top:8px;}
.btn-mystic:hover{opacity:0.85;transform:translateY(-1px);}
.btn-mystic:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.mystic-result-card{margin-top:12px;background:linear-gradient(135deg,rgba(26,5,51,0.95),rgba(13,31,60,0.95));border:1px solid rgba(212,175,55,0.4);border-radius:8px;padding:18px 20px;color:#e8d5a3;font-size:0.88rem;line-height:1.9;white-space:pre-wrap;max-height:none;overflow:visible;}
.mystic-result-label{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:#d4af37;margin-bottom:10px;}

@keyframes slideIn {
  from { opacity:0; transform:translateX(-10px); }
  to   { opacity:1; transform:translateX(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== Supabase 履歴（Fullプラン限定） ===== */
.hist-section{width:100%;margin:16px auto 0;padding:16px 18px;border-radius:12px;background:var(--surface,#fff);border:1px solid var(--border,rgba(0,0,0,0.1));}
.hist-head{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent,#b87333);margin-bottom:10px;font-family:monospace;}
.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-card{padding:11px 13px;border-radius:9px;background:var(--bg,var(--paper,#f7f3ee));border:1px solid var(--border,rgba(0,0,0,0.08));cursor:pointer;transition:background 0.2s,border-color 0.2s;}
.hist-card:hover{border-color:var(--accent,#b87333);}
.hist-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.hist-card-date{font-size:0.66rem;font-family:monospace;opacity:0.55;color:var(--muted,#8a7e72);}
.hist-card-title{font-size:0.88rem;font-weight:600;margin-bottom:2px;color:var(--ink,var(--text,#1a1612));}
.hist-card-summary{font-size:0.75rem;color:var(--muted,#8a7e72);line-height:1.5;}
.hist-del{margin-left:auto;background:none;border:none;font-size:0.9rem;cursor:pointer;opacity:0.3;transition:opacity 0.2s;padding:1px 4px;border-radius:4px;}
.hist-del:hover{opacity:1;}
.hist-empty{font-size:0.75rem;color:var(--muted,#8a7e72);font-family:monospace;text-align:center;padding:12px 0;opacity:0.7;}
.hist-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.hist-modal{background:var(--surface,#fff);border-radius:16px;padding:22px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.25);border:1px solid var(--border,rgba(0,0,0,0.1));}
.hist-modal-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border,rgba(0,0,0,0.08));}
.hist-modal-date{font-size:0.66rem;font-family:monospace;opacity:0.55;margin-bottom:3px;color:var(--muted,#8a7e72);}
.hist-modal-title{font-size:1.1rem;font-weight:700;color:var(--ink,var(--text,#1a1612));}
.hist-modal-meta{font-size:0.7rem;color:var(--muted,#8a7e72);margin-top:3px;}
.hist-modal-close{margin-left:auto;background:none;border:1px solid var(--border,rgba(0,0,0,0.12));border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:0.84rem;color:var(--muted,#8a7e72);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}
.hist-modal-close:hover{background:var(--bg,rgba(0,0,0,0.04));}
.hist-modal-body{font-size:0.9rem;line-height:1.85;white-space:pre-wrap;color:var(--ink,var(--text,#1a1612));}
</style>

<body>

<header>
  <a class="logo-link" href="#">とむ<span>SYSTEM</span></a>
  <h1>三行<em>タスク</em>整理</h1>
  <p class="subtitle">AI が今日の最重要タスクを 3 つに絞る</p>
</header>

<div class="card">
  <label for="input">今日やること・頭の中にあること</label>
  <textarea aria-label="例）資料作成、メール返信、請求書送付、買い物、ブログ更新、コード修正…"
    id="input"
    placeholder="例）資料作成、メール返信、請求書送付、買い物、ブログ更新、コード修正…"
  ></textarea>

  <div class="btn-wrap">
    <button id="runBtn" onclick="runAI()">
      <div class="spinner"></div>
      <span class="btn-text">▷ 整理する</span>
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-area" id="resultArea">
    <div class="result-label">Today's 3 Tasks</div>
    <div class="tasks-list" id="tasksList"></div>
    <div class="card-footer">
      <span class="badge">Powered by Claude</span>
      <button class="retry-btn" onclick="resetUI()">やり直す</button>
    </div>
    <!-- MYSTIC -->
    <div class="mystic-section">
      <button class="btn-mystic" onclick="callMystic('cosmic_timing',{action:'今日の3つのタスクを整理した'})">✨ MYSTICで占う</button>
      <div id="mystic-result"></div>
    </div>
  </div>
</div>

<div id="hist-section" class="hist-section" style="display:none;">
  <div class="hist-head">Past Sessions — 履歴</div>
  <div id="hist-list" class="hist-list"></div>
</div>

<p class="page-footer">とむSYSTEM — App 04</p>

<script>
const WORKER_URL = "https://orange-sound-354b.inverted-triangle-leef.workers.dev/";

async function runAI() {
  const input = document.getElementById("input").value.trim();
  if (!input) return;

  const btn = document.getElementById("runBtn");
  const errorMsg = document.getElementById("errorMsg");
  const resultArea = document.getElementById("resultArea");

  // ローディング開始
  btn.disabled = true;
  btn.classList.add("loading");
  errorMsg.style.display = "none";
  resultArea.style.display = "none";

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        appType: "three-tasks",
        input: input,
        email: TomuAuth.getEmail()
      })
    });

    const data = await res.json();
    if (data.error === "subscription_required" || data.error === "login_required") {
      TomuAuth.showOverlay();
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    if (data.error) throw new Error(data.error);

    renderTasks(data.result);
    if(data.result&&window.histSave){histSave({title:'今日の3つのタスク',summary:String(data.result).replace(/[#*>-]+/g,' ').slice(0,80),content:String(data.result),meta:''});setTimeout(histLoad,1000);}

  } catch (err) {
    errorMsg.textContent = "エラーが発生しました：" + err.message;
    errorMsg.style.display = "block";
    tomuShowRetry(runAI);
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
  }
}

function renderTasks(rawText) {
  // 行ごとに分割して空行・記号除去
  const lines = rawText
    .split("\n")
    .map(l => l.replace(/^[-・•\d\.\)]+\s*/, "").trim())
    .filter(l => l.length > 2)
    .slice(0, 3);

  const list = document.getElementById("tasksList");
  list.innerHTML = "";

  const nums = ["Ⅰ", "Ⅱ", "Ⅲ"];

  lines.forEach((task, i) => {
    const item = document.createElement("div");
    item.className = "task-item";
    item.innerHTML = `
      <span class="task-num">${nums[i]}</span>
      <span class="task-text">${escapeHtml(task)}</span>
      <div class="task-done" onclick="toggleDone(this)"></div>
    `;
    list.appendChild(item);
  });

  // 3つ未満の場合の補完（念のため）
  while (list.children.length < 3) {
    const item = document.createElement("div");
    item.className = "task-item";
    item.innerHTML = `<span class="task-num">${nums[list.children.length]}</span><span class="task-text" style="color:var(--muted);font-style:italic;">（タスクなし）</span><div class="task-done"></div>`;
    list.appendChild(item);
  }

  document.getElementById("resultArea").style.display = "block";
}

function toggleDone(el) {
  el.classList.toggle("checked");
  el.closest(".task-item").classList.toggle("done");
}

function resetUI() {
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("errorMsg").style.display = "none";
  document.getElementById("input").value = "";
  document.getElementById("input").focus();
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Enterキー（Ctrl+Enter）で実行
document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && e.ctrlKey) runAI();
});

async function callMystic(tool, args) {
  const MYSTIC_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev/mystic-bridge';
  const btn = document.querySelector('.btn-mystic');
  const wrap = document.getElementById('mystic-result');
  btn.disabled = true;
  btn.textContent = '✨ 星々に問いかけています…';
  wrap.innerHTML = '<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC</div>星々があなたのために語ります...</div>';
  try {
    const res = await fetch(MYSTIC_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ tool: tool, arguments: args })
    });
    const data = await res.json();
    const msg = (data.content && data.content[0] && data.content[0].text) || '占い結果を取得できませんでした。';
    const safe = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    wrap.innerHTML = `<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC より</div>${safe}</div>`;
  } catch(e) {
    wrap.innerHTML = '<div class="mystic-result-card">⚠ 星々との通信が途絶えました。しばらくしてからお試しください。</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ MYSTICで占う';
  }
}
</script>

<!-- とむSYSTEM 共通認証モジュール -->
<div id="hist-modal" class="hist-modal-overlay" style="display:none;" onclick="histClose(event)">
  <div class="hist-modal" onclick="event.stopPropagation()">
    <div class="hist-modal-hdr">
      <div style="flex:1"><div class="hist-modal-date" id="hist-modal-date"></div><div class="hist-modal-title" id="hist-modal-title"></div><div class="hist-modal-meta" id="hist-modal-meta"></div></div>
      <button class="hist-modal-close" onclick="histClose()">✕</button>
    </div>
    <div class="hist-modal-body" id="hist-modal-body"></div>
  </div>
</div>
<script>
(function(){
const A='three-tasks',W='https://orange-sound-354b.inverted-triangle-leef.workers.dev';
let _s=[];
function _isFull(){return !!(window.TomuAuth&&TomuAuth.getPlan&&TomuAuth.getPlan()==='full');}
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.histLoad=async function(){if(!_isFull()){const sec=document.getElementById('hist-section');if(sec)sec.style.display='none';return;}const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?app_id='+A+'&limit=5',{headers:{'X-Customer-Email':em}});const d=await r.json();_s=d.sessions||[];histRender(_s);}catch(x){}};
window.histRender=function(ss){const sec=document.getElementById('hist-section');const li=document.getElementById('hist-list');if(!sec||!li)return;if(!_isFull()){sec.style.display='none';return;}if(!ss.length){li.innerHTML='<p class="hist-empty">まだ履歴がありません</p>';sec.style.display='';return;}li.innerHTML=ss.map((s,i)=>{const sd=s.session_data||{},dt=new Date(s.created_at).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});return'<div class="hist-card" onclick="histOpen('+i+')"><div class="hist-card-meta"><span class="hist-card-date">'+dt+'</span><button class="hist-del" onclick="event.stopPropagation();histDel(\''+_e(s.id)+'\')">🗑</button></div><div class="hist-card-title">'+_e(sd.title||'—')+'</div>'+(sd.summary?'<div class="hist-card-summary">'+_e(sd.summary)+'</div>':'')+'</div>';}).join('');sec.style.display='';};
window.histOpen=function(i){const s=_s[i];if(!s)return;const sd=s.session_data||{};document.getElementById('hist-modal-date').textContent=new Date(s.created_at).toLocaleDateString('ja-JP',{year:'numeric',month:'numeric',day:'numeric'});document.getElementById('hist-modal-title').textContent=sd.title||'—';document.getElementById('hist-modal-meta').textContent=sd.meta||'';document.getElementById('hist-modal-body').textContent=sd.content||'';document.getElementById('hist-modal').style.display='flex';document.body.style.overflow='hidden';};
window.histClose=function(e){if(e&&e.target!==document.getElementById('hist-modal'))return;document.getElementById('hist-modal').style.display='none';document.body.style.overflow='';};
window.histDel=async function(id){if(!id||!confirm('この履歴を削除しますか？'))return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?id='+encodeURIComponent(id),{method:'DELETE',headers:{'X-Customer-Email':em}});if(r.ok)await histLoad();else alert('削除に失敗しました。');}catch(x){alert('通信エラー');}};
window.histSave=async function(d){if(!_isFull())return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{await fetch(W+'/api/history',{method:'POST',headers:{'Content-Type':'application/json','X-Customer-Email':em},body:JSON.stringify({app_id:A,session_data:d})});}catch(x){}};
document.addEventListener('DOMContentLoaded',function(){setTimeout(histLoad,800);});
document.addEventListener('tomu:unlocked',function(){setTimeout(histLoad,300);});
})();
</script>

<script>
// A-10 共通: AI生成に失敗したとき「再試行」ボタンを表示する（単発Lightアプリ用）
function tomuHideRetry(){ var b=document.getElementById('tomu-retry-bar'); if(b) b.remove(); }
function tomuShowRetry(fn){
  tomuHideRetry();
  var bar=document.createElement('div');
  bar.id='tomu-retry-bar';
  bar.setAttribute('role','alert');
  bar.style.cssText='position:fixed;left:50%;bottom:20px;transform:translateX(-50%);display:flex;align-items:center;gap:10px;max-width:92%;background:#fff;border:1px solid #fccaca;color:#c0392b;border-radius:24px;padding:8px 10px 8px 16px;font-size:13px;line-height:1.5;z-index:99999;box-shadow:0 6px 24px rgba(0,0,0,.18);font-family:inherit;';
  var span=document.createElement('span'); span.textContent='通信に失敗しました';
  var rbtn=document.createElement('button'); rbtn.type='button'; rbtn.textContent='再試行';
  rbtn.setAttribute('aria-label','直前のリクエストを再試行する');
  rbtn.style.cssText='flex-shrink:0;background:#c0392b;color:#fff;border:none;border-radius:16px;padding:6px 16px;font-family:inherit;font-size:12px;cursor:pointer;';
  rbtn.onclick=function(){ tomuHideRetry(); try{ if(typeof fn==='function') fn(); }catch(e){} };
  var cbtn=document.createElement('button'); cbtn.type='button'; cbtn.textContent='✕';
  cbtn.setAttribute('aria-label','閉じる');
  cbtn.style.cssText='flex-shrink:0;background:none;border:none;color:#c0392b;font-size:15px;line-height:1;cursor:pointer;padding:2px 4px;';
  cbtn.onclick=tomuHideRetry;
  bar.appendChild(span); bar.appendChild(rbtn); bar.appendChild(cbtn);
  document.body.appendChild(bar);
}
</script>
</body>
</html>
