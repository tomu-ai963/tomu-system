<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一言読書録 — とむSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400;500&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:      #1a1612;
  --paper:    #f7f3ee;
  --warm:     #f0e8dc;
  --accent:   #b87333;
  --accent2:  #7a9e7e;
  --muted:    #8a7e72;
  --border:   #ddd5c8;
  --surface:  #ffffff;
  --light-accent: #eedfc8;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  line-height: 1.8;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ノイズテクスチャ */
body::before {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ===== NAV ===== */
nav {
  position: fixed;
  top:0; left:0; right:0;
  z-index:100;
  padding: 18px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(247,243,238,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--ink);
  text-decoration: none;
}
.nav-logo span { color: var(--accent); }

.nav-back {
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-back:hover { color: var(--accent); }

/* ===== メイン ===== */
main {
  padding-top: 100px;
  max-width: 680px;
  margin: 0 auto;
  padding-left: 24px;
  padding-right: 24px;
  padding-bottom: 80px;
}

/* ===== ヘッダーブロック ===== */
.app-header {
  text-align: center;
  margin-bottom: 52px;
  animation: fadeUp 0.7s ease both;
}

.app-icon {
  font-size: 2.4rem;
  margin-bottom: 16px;
  display: block;
  opacity: 0.8;
}

.app-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--ink);
  margin-bottom: 8px;
}
.app-title em {
  font-style: italic;
  color: var(--accent);
}

.app-subtitle {
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

.app-desc {
  font-size: 0.88rem;
  color: var(--muted);
  max-width: 400px;
  margin: 0 auto;
  line-height: 1.9;
}

/* ===== フォームカード ===== */
.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 40px 44px;
  margin-bottom: 32px;
  animation: fadeUp 0.7s 0.15s ease both;
  position: relative;
}

/* 左上コーナー装飾 */
.form-card::before {
  content:'';
  position:absolute;
  top: -1px; left: -1px;
  width: 24px; height: 24px;
  border-top: 2px solid var(--accent);
  border-left: 2px solid var(--accent);
}

.field {
  margin-bottom: 28px;
}

label {
  display: block;
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  font-weight: 400;
}

input[type="text"],
textarea {
  width: 100%;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 1px;
  padding: 14px 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--ink);
  transition: border-color .25s, background .25s;
  outline: none;
  resize: none;
  line-height: 1.8;
}

input[type="text"]:focus,
textarea:focus {
  border-color: var(--accent);
  background: var(--surface);
}

input[type="text"]::placeholder,
textarea::placeholder {
  color: var(--border);
}

/* 送信ボタン */
.btn-generate {
  width: 100%;
  padding: 16px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 1px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .25s, transform .1s;
  position: relative;
  overflow: hidden;
}
.btn-generate:hover {
  background: var(--accent);
}
.btn-generate:active {
  transform: scale(0.99);
}
.btn-generate:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  background: var(--muted);
}

/* ローディング */
.loading-dots {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}
.loading-dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--paper);
  animation: dot 1.2s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }

/* ===== 結果エリア ===== */
.result-area {
  display: none;
  animation: fadeUp 0.5s ease both;
}
.result-area.visible { display: block; }

/* 名言カード */
.quote-card {
  background: var(--warm);
  border: 1px solid var(--light-accent);
  border-radius: 2px;
  padding: 44px 48px;
  text-align: center;
  position: relative;
  margin-bottom: 20px;
}

/* 引用符装飾 */
.quote-card::before {
  content: '"';
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 6rem;
  color: var(--light-accent);
  position: absolute;
  top: -10px; left: 20px;
  line-height: 1;
  pointer-events: none;
}

.quote-book {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.quote-book::before,
.quote-book::after {
  content:'';
  flex:1;
  max-width:50px;
  height:1px;
  background: var(--border);
}

.quote-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  font-weight: 400;
  line-height: 1.9;
  color: var(--ink);
  letter-spacing: 0.03em;
  position: relative;
  z-index: 1;
}

.quote-date {
  margin-top: 24px;
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  color: var(--muted);
}

/* アクションボタン群 */
.result-actions {
  display: flex;
  gap: 12px;
}

.btn-copy,
.btn-reset {
  flex: 1;
  padding: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  border-radius: 1px;
  cursor: pointer;
  transition: all .2s;
  border: 1px solid var(--border);
}

.btn-copy {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.btn-copy:hover { background: var(--accent); border-color: var(--accent); }

.btn-reset {
  background: transparent;
  color: var(--muted);
}
.btn-reset:hover { border-color: var(--ink); color: var(--ink); }

/* ===== 履歴セクション ===== */
.history-section {
  margin-top: 56px;
  animation: fadeUp 0.7s 0.3s ease both;
}

.section-label {
  font-size: 0.68rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-clear-history {
  background: none;
  border: none;
  font-size: 0.66rem;
  letter-spacing: 0.15em;
  color: var(--border);
  cursor: pointer;
  transition: color .2s;
  text-transform: uppercase;
}
.btn-clear-history:hover { color: var(--accent); }

.history-empty {
  text-align: center;
  color: var(--border);
  font-size: 0.8rem;
  padding: 32px;
  letter-spacing: 0.1em;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.history-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 1px;
  padding: 22px 26px;
  display: grid;
  gap: 8px;
  transition: border-color .2s;
  cursor: default;
}
.history-item:hover { border-color: var(--light-accent); }

.history-book {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}

.history-quote {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--ink);
  line-height: 1.7;
}

.history-meta {
  font-size: 0.65rem;
  color: var(--border);
  letter-spacing: 0.12em;
}

/* ===== フッター ===== */
footer {
  text-align: center;
  padding: 40px 24px;
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  color: var(--border);
  border-top: 1px solid var(--border);
  text-transform: uppercase;
}
footer a { color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--accent); }

/* ===== アニメーション ===== */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes dot {
  0%,80%,100% { transform:scale(0.6); opacity:0.4; }
  40%          { transform:scale(1);   opacity:1; }
}

/* ===== モバイル ===== */
@media (max-width:600px) {
  nav { padding: 16px 20px; }
  main { padding-top:80px; padding-left:16px; padding-right:16px; }
  .form-card { padding: 28px 22px; }
  .quote-card { padding: 36px 24px; }
  .quote-card::before { font-size: 4rem; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">とむ<span>SYSTEM</span></a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
      <path d="M5 1L1 5L5 9M1 5H13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back
  </a>
</nav>

<main>

  <!-- ヘッダー -->
  <div class="app-header">
    <span class="app-icon">📖</span>
    <h1 class="app-title">一言<em>読書録</em></h1>
    <p class="app-subtitle">Book Log — とむSYSTEM</p>
    <p class="app-desc">本のタイトルと感想を入力すると、その本の本質を突いた「自分だけの座右の銘」を一文で生成します。</p>
  </div>

  <!-- フォームカード -->
  <div class="form-card">
    <div class="field">
      <label for="book-title">Book Title — 本のタイトル</label>
      <input type="text" id="book-title" placeholder="例：星の王子さま" maxlength="80">
    </div>
    <div class="field">
      <label for="book-impression">Impression — 感想・心に残ったこと</label>
      <textarea id="book-impression" rows="4" placeholder="例：大切なものは目に見えないという言葉が刺さった。大人になるにつれて忘れていたものを思い出させてくれた。"></textarea>
    </div>
    <button class="btn-generate" id="btn-generate" onclick="generate()">
      <span id="btn-label">Generate — 座右の銘を生成</span>
    </button>
  </div>

  <!-- 結果エリア -->
  <div class="result-area" id="result-area">
    <div class="quote-card">
      <div class="quote-book" id="result-book-title">タイトル</div>
      <div class="quote-text" id="result-quote">ここに座右の銘が入ります</div>
      <div class="quote-date" id="result-date"></div>
    </div>
    <div class="result-actions">
      <button class="btn-copy" onclick="copyQuote()">Copy — コピー</button>
      <button class="btn-reset" onclick="resetForm()">Reset — もう一度</button>
    </div>
  </div>

  <!-- 履歴 -->
  <div class="history-section" id="history-section" style="display:none">
    <div class="section-label">
      Reading Log — 読書録
      <button class="btn-clear-history" onclick="clearHistory()">Clear All</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

</main>

<footer>
  <a href="index.html">とむSYSTEM</a> &nbsp;·&nbsp; Powered by Claude Haiku &nbsp;·&nbsp; &copy; 2025 Tomu
</footer>

<script>
const WORKER_URL = "https://orange-sound-354b.inverted-triangle-leef.workers.dev/";
const HISTORY_KEY = "book_log_history";

let currentQuote = "";
let currentBook  = "";

async function generate() {
  const title      = document.getElementById("book-title").value.trim();
  const impression = document.getElementById("book-impression").value.trim();

  if (!title) {
    alert("本のタイトルを入力してください");
    return;
  }
  if (!impression) {
    alert("感想を入力してください");
    return;
  }

  const btn   = document.getElementById("btn-generate");
  const label = document.getElementById("btn-label");
  btn.disabled = true;
  label.innerHTML = `<span class="loading-dots"><span></span><span></span><span></span></span>`;

  // 結果エリアを隠す
  document.getElementById("result-area").classList.remove("visible");

  const input = `本のタイトル：${title}\n感想：${impression}`;

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ appType: "book-log", input, email: TomuAuth.getEmail() }),
    });

    const data = await res.json();
    if (data.error === "subscription_required" || data.error === "login_required") {
      TomuAuth.showOverlay();
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const quote = data.result || "（結果を取得できませんでした）";

    currentQuote = quote;
    currentBook  = title;

    // 表示
    document.getElementById("result-book-title").textContent = title;
    document.getElementById("result-quote").textContent = quote;
    document.getElementById("result-date").textContent = formatDate(new Date());

    const resultArea = document.getElementById("result-area");
    resultArea.classList.add("visible");
    resultArea.scrollIntoView({ behavior: "smooth", block: "nearest" });

    // 履歴保存
    saveHistory(title, quote);
    renderHistory();

  } catch (err) {
    alert("エラーが発生しました。しばらくしてから再試行してください。");
    console.error(err);
  } finally {
    btn.disabled = false;
    label.textContent = "Generate — 座右の銘を生成";
  }
}

function resetForm() {
  document.getElementById("result-area").classList.remove("visible");
  document.getElementById("book-title").value = "";
  document.getElementById("book-impression").value = "";
  document.getElementById("book-title").focus();
}

function copyQuote() {
  const text = `「${currentBook}」より\n${currentQuote}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(".btn-copy");
    const orig = btn.textContent;
    btn.textContent = "Copied ✓";
    setTimeout(() => btn.textContent = orig, 1800);
  }).catch(() => {
    alert("クリップボードへのコピーに失敗しました");
  });
}

// ===== 履歴 =====
function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  } catch { return []; }
}

function saveHistory(book, quote) {
  const history = loadHistory();
  history.unshift({ book, quote, date: new Date().toISOString() });
  // 最大20件
  if (history.length > 20) history.pop();
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function clearHistory() {
  if (!confirm("読書録をすべて削除しますか？")) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function renderHistory() {
  const history = loadHistory();
  const section = document.getElementById("history-section");
  const list    = document.getElementById("history-list");

  if (history.length === 0) {
    section.style.display = "none";
    return;
  }

  section.style.display = "block";
  list.innerHTML = history.map(item => `
    <div class="history-item">
      <div class="history-book">📖 ${escapeHtml(item.book)}</div>
      <div class="history-quote">${escapeHtml(item.quote)}</div>
      <div class="history-meta">${formatDate(new Date(item.date))}</div>
    </div>
  `).join("");
}

function formatDate(d) {
  return d.toLocaleDateString("ja-JP", { year:"numeric", month:"long", day:"numeric" });
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Enter送信（タイトルフィールド）
document.getElementById("book-title").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    document.getElementById("book-impression").focus();
  }
});

// 初期化
renderHistory();
</script>

<!-- とむSYSTEM 共通認証モジュール -->
<script src="../tomu-login.js"></script>
</body>
</html>
