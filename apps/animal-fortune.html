// ========== 計算ロジック ==========
// num = base + day - 1 （baseは「その月の1日のキャラ番号」）
// ※ base + day だと全テストケースで1ずれるため -1 が必要
function getAnimalFortune(birthdate) {
  const [y, m, d] = birthdate.split('-').map(Number);
  const table = yearMonthTable[y];
  if (!table) return null;
  const base = table[m - 1];
  let num = base + d - 1;
  if (num > 60) num -= 60;
  return { num, animal: animalMap[num] || '不明' };
}

function updateCalc() {
  const birthdate = birthdateInput.value;
  const gender    = genderSelect.value;

  if (!birthdate || !gender) {
    calcDisplay.classList.remove('visible');
    submitBtn.disabled = true;
    btnText.textContent = '生年月日と性別を入力してください';
    currentResult = null;
    return;
  }

  const r = getAnimalFortune(birthdate);
  if (!r) {
    calcDisplay.textContent = '対応していない年代です（1921〜2010年）';
    calcDisplay.classList.add('visible');
    submitBtn.disabled = true;
    currentResult = null;
    return;
  }

  currentResult = r;
  calcDisplay.textContent = `キャラ番号：${r.num} ／ 守護動物：${r.animal}`;
  calcDisplay.classList.add('visible');
  submitBtn.disabled = false;
  btnText.textContent = '今すぐ占う ✦';
  resultCard.classList.remove('visible');
  errorMsg.classList.remove('visible');
}

birthdateInput.addEventListener('change', updateCalc);
genderSelect.addEventListener('change', updateCalc);

async function fetchReading() {
  if (!currentResult || !birthdateInput.value || !genderSelect.value) return;

  submitBtn.disabled = true;
  submitBtn.classList.add('loading');
  btnText.textContent = '占っています…';
  resultCard.classList.remove('visible');
  errorMsg.classList.remove('visible');

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        birthdate: birthdateInput.value,
        gender: genderSelect.value,
        animal: currentResult.animal,
        num: currentResult.num,
        email: TomuAuth.getEmail()
      })
    });

    const data = await res.json();

    if (data.error === 'subscription_required' || data.error === 'login_required') {
      TomuAuth.showOverlay();
      return;
    }
    if (!res.ok || data.error) throw new Error(data.error || 'Worker error');

    resultAnimal.textContent = `${genderSelect.value}の${currentResult.animal}（キャラ番号${currentResult.num}）`;
    resultText.textContent = data.result;
    resultCard.classList.add('visible');
    resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    errorMsg.textContent = `エラーが発生しました：${err.message}`;
    errorMsg.classList.add('visible');
  } finally {
    submitBtn.disabled = false;
    submitBtn.classList.remove('loading');
    btnText.textContent = '今すぐ占う ✦';
  }
}

submitBtn.addEventListener('click', fetchReading);
retryBtn.addEventListener('click', fetchReading);
</script>
