<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法律アドバイザー | tomu SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<script src="/tomu-system/common/header.js"></script>
<style>
  :root {
    --bg: #eeedf0;
    --surface: #f8f7fa;
    --surface2: #e8e6ec;
    --border: #d0cdd8;
    --accent: #4a4060;
    --accent-light: #9b94b8;
    --text: #1e1c26;
    --text-muted: #7a7688;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 44px;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .header-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #f8f7fa; font-size: 18px;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300; letter-spacing: 0.05em;
  }

  .header-subtitle { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 1px; }

  .mode-toggle {
    display: flex; background: var(--surface2);
    border-radius: 20px; padding: 3px;
    border: 1px solid var(--border);
  }

  .mode-btn {
    padding: 5px 12px; border-radius: 16px; border: none;
    background: transparent; font-family: 'Noto Serif JP', serif;
    font-size: 11px; color: var(--text-muted); cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em;
  }

  .mode-btn.active { background: var(--accent); color: #f8f7fa; }

  .quick-actions {
    padding: 16px 16px 8px;
    display: flex; gap: 8px;
    overflow-x: auto; scrollbar-width: none;
  }

  .quick-actions::-webkit-scrollbar { display: none; }

  .quick-btn {
    flex-shrink: 0; padding: 8px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; font-family: 'Noto Serif JP', serif;
    font-size: 12px; color: var(--text); cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }

  .quick-btn:hover { background: var(--accent); color: #f8f7fa; border-color: var(--accent); }

  .chat-area {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .welcome {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px 20px; text-align: center;
    animation: fadeUp 0.5s ease;
  }

  .welcome-icon { font-size: 32px; margin-bottom: 12px; }

  .welcome-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300; margin-bottom: 8px; color: var(--accent);
  }

  .welcome-text { font-size: 13px; color: var(--text-muted); line-height: 1.8; }

  .disclaimer {
    margin-top: 14px; padding: 10px 14px;
    background: var(--surface2); border-radius: 8px;
    font-size: 11px; color: var(--text-muted); line-height: 1.6;
    text-align: left; border-left: 2px solid var(--accent-light);
  }

  .message { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }

  .avatar.ai { background: var(--accent); color: #f8f7fa; }
  .avatar.user { background: var(--text); color: #f8f7fa; }

  .bubble {
    max-width: 80%; padding: 12px 16px; border-radius: 16px;
    font-size: 14px; line-height: 1.8;
  }

  .message.ai .bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; color: var(--text);
  }

  .message.user .bubble {
    background: var(--text); color: #f8f7fa;
    border-radius: 16px 4px 16px 16px;
  }

  .bubble h4 { font-size: 13px; font-weight: 400; margin-bottom: 6px; color: var(--accent); }
  .bubble ul { padding-left: 16px; margin-top: 6px; }
  .bubble li { margin-bottom: 4px; font-size: 13px; }

  .loading {
    display: flex; gap: 6px; padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; width: fit-content;
  }

  .dot {
    width: 6px; height: 6px; background: var(--accent-light);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  .input-area {
    padding: 12px 16px 20px;
    background: var(--surface); border-top: 1px solid var(--border);
  }

  .mode-indicator {
    font-size: 11px; color: var(--text-muted);
    text-align: center; margin-bottom: 8px; letter-spacing: 0.05em;
  }

  .input-wrap {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 24px; padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent-light); }

  textarea {
    flex: 1; border: none; background: transparent;
    font-family: 'Noto Serif JP', serif; font-size: 14px;
    color: var(--text); resize: none; outline: none;
    max-height: 120px; line-height: 1.6;
  }

  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 38px; height: 38px; background: var(--accent);
    border: none; border-radius: 50%; color: #f8f7fa;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 16px;
  }

  .send-btn:hover { background: var(--text); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">⚖</div>
    <div>
      <div class="header-title">法律アドバイザー</div>
      <div class="header-subtitle">LEGAL ADVISOR</div>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('general', this)">一般</button>
    <button class="mode-btn" onclick="setMode('pro', this)">専門家</button>
  </div>
</div>

<div class="quick-actions">
  <button class="quick-btn" onclick="quickAsk('契約書の内容を確認したい')">📄 契約書チェック</button>
  <button class="quick-btn" onclick="quickAsk('労働問題について相談したい')">👷 労働問題</button>
  <button class="quick-btn" onclick="quickAsk('離婚・親権について知りたい')">👨‍👩‍👧 離婚・親権</button>
  <button class="quick-btn" onclick="quickAsk('相続・遺言について教えてほしい')">📜 相続・遺言</button>
  <button class="quick-btn" onclick="quickAsk('借金・債務整理について')">💳 債務整理</button>
  <button class="quick-btn" onclick="quickAsk('慰謝料・損害賠償について')">⚡ 損害賠償</button>
  <button class="quick-btn" onclick="quickAsk('内容証明の書き方を教えてほしい')">✉️ 内容証明</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="welcome-icon">🏛️</div>
    <div class="welcome-title">Legal Advisor</div>
    <div class="welcome-text">
      契約・労働・相続・離婚・損害賠償など<br>
      法律に関するご質問にお答えします。<br>
      上のボタンからよくある相談を選ぶか<br>
      お気軽にメッセージをどうぞ。
    </div>
    <div class="disclaimer">
      ⚠️ 本サービスはAIによる一般的な法律情報の提供を目的としています。個別の法的判断・手続きについては、必ず弁護士等の専門家にご相談ください。
    </div>
  </div>
</div>

<div class="input-area">
  <div class="mode-indicator" id="modeIndicator">一般向けモード — わかりやすく解説します</div>
  <div class="input-wrap">
    <textarea
      id="userInput"
      placeholder="法律・契約・権利などについて質問してください..."
      rows="1"
      oninput="autoResize(this)"
      onkeydown="handleKey(event)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
const WORKER_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev/api/legal-advisor';

let currentMode = 'general';
let isLoading = false;
let conversationHistory = [];

const systemPrompts = {
  general: `あなたは「法律アドバイザー」です。一般の方向けに、法律・権利・手続きについてわかりやすく丁寧に説明してください。

【回答スタイル】
- 法律用語は使わず、または使う場合は必ず解説を加える
- 「一般的には〜」「多くのケースでは〜」など断定を避けた表現を使う
- 具体的な手順や選択肢を整理して伝える
- 相談者の不安に寄り添った温かみのある文体にする

【必ず守ること】
- 個別の法的判断・勝訴可能性などについて断定的な回答はしない
- 「詳細は弁護士にご相談ください」を適切に案内する
- 緊急性が高いケース（DV・ハラスメント等）は相談窓口も案内する

【対応範囲】
契約トラブル・労働問題（解雇・残業代）・離婚・親権・養育費・相続・遺言・債務整理・損害賠償・内容証明・消費者トラブル・賃貸トラブルなど`,

  pro: `あなたは「法律アドバイザー（専門家モード）」です。弁護士・司法書士・法務担当者など専門家向けに、法律の専門的な情報を提供してください。

【回答スタイル】
- 法律用語・条文番号を適切に使用する
- 判例・通説・有力説を踏まえた説明をする
- 実務的な対応フローや書面の考え方を重視する
- 複数の法的構成がある場合は比較して提示する

【必ず守ること】
- AIの限界を認識し、最終判断は専門家が行う旨を適切に伝える
- 判例が分かれる事項・解釈が流動的な事項は明示する
- 法改正・新判例については確認を促す

【対応範囲】
民法・労働法・家族法・相続法の実務、契約書の法的論点、訴訟戦略の概要、書面・答弁書の下書き補助、依頼者向け説明文の生成、法令調査の補助など`
};

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const indicator = document.getElementById('modeIndicator');
  indicator.textContent = mode === 'general'
    ? '一般向けモード — わかりやすく解説します'
    : '専門家モード — 実務的な情報を提供します';
  conversationHistory = [];
}

function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const loadingEl = appendLoading();

  try {
    const email = window.TomuAuth ? window.TomuAuth.getEmail() : null;
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: email,
        system: systemPrompts[currentMode],
        messages: conversationHistory,
        max_tokens: 1000,
      })
    });

    const data = await response.json();
    loadingEl.remove();

    const reply = data.content?.[0]?.text || 'エラーが発生しました。';
    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage('ai', reply);

  } catch (e) {
    loadingEl.remove();
    appendMessage('ai', '通信エラーが発生しました。もう一度お試しください。');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function appendMessage(role, text) {
  const chatArea = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '⚖' : '人';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

function appendLoading() {
  const chatArea = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'message ai';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '⚖';

  const loading = document.createElement('div');
  loading.className = 'loading';
  loading.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  msg.appendChild(avatar);
  msg.appendChild(loading);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/### (.+)/g, '<h4>$1</h4>')
    .replace(/## (.+)/g, '<h4>$1</h4>')
    .replace(/^[-・] (.+)/gm, '<li>$1</li>')
    .replace(/\n/g, '<br>');
}
</script>

<script>window.TOMU_REQUIRED_PLAN = 'full';</script>
<script src="/tomu-system/tomu-login.js"></script>
</body>
</html>
