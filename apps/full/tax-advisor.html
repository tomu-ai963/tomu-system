<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>税務アドバイザー | tomu SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<script src="/tomu-system/common/header.js"></script>
<style>
  :root {
    --bg: #f5f0ea;
    --surface: #fdfaf6;
    --surface2: #f0ebe3;
    --border: #ddd5c8;
    --accent: #8b6f47;
    --accent-light: #c4a882;
    --text: #2d2520;
    --text-muted: #8a7d72;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 44px;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .header-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fdfaf6; font-size: 16px;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300; letter-spacing: 0.05em;
  }

  .header-subtitle { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 1px; }

  .mode-toggle {
    display: flex; background: var(--surface2);
    border-radius: 20px; padding: 3px;
    border: 1px solid var(--border);
  }

  .mode-btn {
    padding: 5px 12px; border-radius: 16px; border: none;
    background: transparent; font-family: 'Noto Serif JP', serif;
    font-size: 11px; color: var(--text-muted); cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.05em;
  }

  .mode-btn.active { background: var(--accent); color: #fdfaf6; }

  .quick-actions {
    padding: 16px 16px 8px;
    display: flex; gap: 8px;
    overflow-x: auto; scrollbar-width: none;
  }

  .quick-actions::-webkit-scrollbar { display: none; }

  .quick-btn {
    flex-shrink: 0; padding: 8px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; font-family: 'Noto Serif JP', serif;
    font-size: 12px; color: var(--text); cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }

  .quick-btn:hover { background: var(--accent); color: #fdfaf6; border-color: var(--accent); }

  .chat-area {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .welcome {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px 20px; text-align: center;
    animation: fadeUp 0.5s ease;
  }

  .welcome-icon { font-size: 32px; margin-bottom: 12px; }

  .welcome-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300; margin-bottom: 8px; color: var(--accent);
  }

  .welcome-text { font-size: 13px; color: var(--text-muted); line-height: 1.8; }

  .disclaimer {
    margin-top: 14px; padding: 10px 14px;
    background: var(--surface2); border-radius: 8px;
    font-size: 11px; color: var(--text-muted); line-height: 1.6;
    text-align: left; border-left: 2px solid var(--accent-light);
  }

  .message { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }

  .avatar.ai { background: var(--accent); color: #fdfaf6; }
  .avatar.user { background: var(--text); color: #fdfaf6; }

  .bubble {
    max-width: 80%; padding: 12px 16px; border-radius: 16px;
    font-size: 14px; line-height: 1.8;
  }

  .message.ai .bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; color: var(--text);
  }

  .message.user .bubble {
    background: var(--text); color: #fdfaf6;
    border-radius: 16px 4px 16px 16px;
  }

  .bubble h4 { font-size: 13px; font-weight: 400; margin-bottom: 6px; color: var(--accent); }
  .bubble ul { padding-left: 16px; margin-top: 6px; }
  .bubble li { margin-bottom: 4px; font-size: 13px; }

  .loading {
    display: flex; gap: 6px; padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; width: fit-content;
  }

  .dot {
    width: 6px; height: 6px; background: var(--accent-light);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  .input-area {
    padding: 12px 16px 20px;
    background: var(--surface); border-top: 1px solid var(--border);
  }

  .mode-indicator {
    font-size: 11px; color: var(--text-muted);
    text-align: center; margin-bottom: 8px; letter-spacing: 0.05em;
  }

  .input-wrap {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 24px; padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent-light); }

  textarea {
    flex: 1; border: none; background: transparent;
    font-family: 'Noto Serif JP', serif; font-size: 14px;
    color: var(--text); resize: none; outline: none;
    max-height: 120px; line-height: 1.6;
  }

  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 38px; height: 38px; background: var(--accent);
    border: none; border-radius: 50%; color: #fdfaf6;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 16px;
  }

  .send-btn:hover { background: var(--text); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">¥</div>
    <div>
      <div class="header-title">税務アドバイザー</div>
      <div class="header-subtitle">TAX ADVISOR</div>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('general', this)">一般</button>
    <button class="mode-btn" onclick="setMode('pro', this)">専門家</button>
  </div>
</div>

<div class="quick-actions">
  <button class="quick-btn" onclick="quickAsk('経費になるか確認したい')">💼 経費チェック</button>
  <button class="quick-btn" onclick="quickAsk('確定申告について教えてほしい')">📋 確定申告</button>
  <button class="quick-btn" onclick="quickAsk('青色申告と白色申告の違いは？')">📊 青色 vs 白色</button>
  <button class="quick-btn" onclick="quickAsk('医療費控除について知りたい')">🏥 医療費控除</button>
  <button class="quick-btn" onclick="quickAsk('ふるさと納税の上限を知りたい')">🏔 ふるさと納税</button>
  <button class="quick-btn" onclick="quickAsk('フリーランスの税金について')">💻 フリーランス</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="welcome-icon">⚖️</div>
    <div class="welcome-title">Tax Advisor</div>
    <div class="welcome-text">
      税金・確定申告・経費・控除など<br>
      税務に関するご質問にお答えします。<br>
      上のボタンからよくある質問を選ぶか<br>
      お気軽にメッセージをどうぞ。
    </div>
    <div class="disclaimer">
      ⚠️ 本サービスはAIによる一般的な税務情報の提供を目的としています。個別の税務判断・申告については、必ず税理士等の専門家にご相談ください。
    </div>
  </div>
</div>

<div class="input-area">
  <div class="mode-indicator" id="modeIndicator">一般向けモード — わかりやすく解説します</div>
  <div class="input-wrap">
    <textarea
      id="userInput"
      placeholder="税金・確定申告・経費などについて質問してください..."
      rows="1"
      oninput="autoResize(this)"
      onkeydown="handleKey(event)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
const WORKER_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev/api/tax-advisor';

let currentMode = 'general';
let isLoading = false;
let conversationHistory = [];

const systemPrompts = {
  general: `あなたは「税務アドバイザー」です。一般の方向けに、税金・確定申告・経費・各種控除について、わかりやすく丁寧に説明してください。

【回答スタイル】
- 専門用語は使わず、または使う場合は必ず解説を加える
- 具体例を交えてわかりやすく説明する
- 「〜が多いです」「〜のケースが一般的です」など、断定を避けた表現を使う
- 複雑な内容は箇条書きや見出しを使って整理する

【必ず守ること】
- 個別の税務判断・申告の可否について断定的な回答はしない
- 「詳細は税理士にご相談ください」という案内を適切に入れる
- 最新の税法改正については「最新情報はご確認ください」と添える

【対応範囲】
確定申告（白色・青色）、各種控除（医療費・住宅ローン・ふるさと納税等）、経費の考え方、フリーランス・副業の税務、消費税の基礎、相続・贈与の概要など`,

  pro: `あなたは「税務アドバイザー（専門家モード）」です。税理士・経理担当者など専門家向けに、税務の専門的な情報を提供してください。

【回答スタイル】
- 税務専門用語を適切に使用する
- 根拠となる条文・通達を可能な範囲で示す
- 実務的な処理方法・注意点を重視する
- 複数の選択肢がある場合は比較して提示する

【必ず守ること】
- AIの限界を認識し、最終判断は専門家が行う旨を適切に伝える
- 解釈が分かれる事項は「解釈が分かれます」と明示する
- 税制改正・通達の更新については確認を促す

【対応範囲】
法人税・所得税・消費税の実務、仕訳・勘定科目の考え方、節税の概要、申告書の記載方法、クライアント向け説明文の下書き生成など`
};

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const indicator = document.getElementById('modeIndicator');
  indicator.textContent = mode === 'general'
    ? '一般向けモード — わかりやすく解説します'
    : '専門家モード — 実務的な情報を提供します';
  conversationHistory = [];
}

function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const loadingEl = appendLoading();

  try {
    const email = window.TomuAuth ? window.TomuAuth.getEmail() : null;
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: email,
        system: systemPrompts[currentMode],
        messages: conversationHistory,
        max_tokens: 1000,
      })
    });

    const data = await response.json();
    loadingEl.remove();

    const reply = data.content?.[0]?.text || 'エラーが発生しました。';
    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage('ai', reply);

  } catch (e) {
    loadingEl.remove();
    appendMessage('ai', '通信エラーが発生しました。もう一度お試しください。');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function appendMessage(role, text) {
  const chatArea = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '¥' : '人';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

function appendLoading() {
  const chatArea = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'message ai';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '¥';

  const loading = document.createElement('div');
  loading.className = 'loading';
  loading.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  msg.appendChild(avatar);
  msg.appendChild(loading);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/### (.+)/g, '<h4>$1</h4>')
    .replace(/## (.+)/g, '<h4>$1</h4>')
    .replace(/^[-・] (.+)/gm, '<li>$1</li>')
    .replace(/\n/g, '<br>');
}
</script>

<script>window.TOMU_REQUIRED_PLAN = 'full';</script>
<script src="/tomu-system/tomu-login.js"></script>
</body>
</html>
