<html lang="ja">
<head>

<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --border: #e0d9d0;
    --text: #1a1814;
    --muted: #9a9089;
    --accent: #c0392b;
    --accent-light: #fdf0ef;
    --gold: #b8860b;
    --gold-light: #faf6ee;
    --tag-bg: #f0ede8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--text);
  }
  .logo span { color: var(--gold); }
  .back-btn {
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    transition: all 0.2s;
  }
  .back-btn:hover { background: var(--tag-bg); }

  /* Hero */
  .hero {
    text-align: center;
    padding: 40px 24px 32px;
  }
  .hero-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  .hero h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .hero h1 em {
    color: var(--accent);
    font-style: normal;
  }
  .hero p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin: 0 16px 16px;
    padding: 24px 20px;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Subscriptions list */
  .sub-list { display: flex; flex-direction: column; gap: 10px; }

  .sub-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    background: var(--tag-bg);
    border-radius: 10px;
    padding: 10px 12px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .sub-name {
    font-size: 14px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    width: 100%;
    outline: none;
  }
  .sub-name::placeholder { color: var(--muted); }

  .sub-price {
    font-size: 13px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    color: var(--gold);
    width: 70px;
    text-align: right;
    outline: none;
  }
  .sub-price::placeholder { color: #ccc; font-size: 12px; }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.2s;
  }
  .del-btn:hover { color: var(--accent); }

  .add-btn {
    width: 100%;
    margin-top: 12px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .add-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-light); }

  /* Frequency selector */
  .freq-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .freq-chip {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }
  .freq-chip.active {
    background: var(--text);
    color: white;
    border-color: var(--text);
  }

  /* Concern tags */
  .concern-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .concern-chip {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    text-align: center;
    line-height: 1.4;
  }
  .concern-chip.active {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Submit */
  .submit-btn {
    width: calc(100% - 32px);
    margin: 8px 16px 0;
    padding: 16px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .submit-btn:hover { background: #333; }
  .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }

  /* Result */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin: 16px 16px 0;
    padding: 24px 20px;
    display: none;
  }
  .result-card.show { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .result-header h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 600;
  }

  .result-body {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .loading.show { display: block; }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: var(--muted); }

  /* Error */
  .error-msg {
    background: var(--accent-light);
    border: 1px solid #f5c6c2;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--accent);
    margin: 12px 16px 0;
    display: none;
  }
  .error-msg.show { display: block; }

  /* Footer */
  .footer-label {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    margin-left: 16px;
    margin-right: 16px;
  }

  /* ===== MYSTIC SECTION ===== */
  .mystic-section{margin:16px 16px 0;padding-top:16px;border-top:1px solid rgba(212,175,55,0.2);}
  .btn-mystic{width:100%;background:linear-gradient(135deg,#1a0533,#0d1f3c);color:#d4af37;border:1px solid #d4af37;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;transition:opacity 0.2s,transform 0.1s;font-family:inherit;letter-spacing:0.05em;margin-top:8px;}
  .btn-mystic:hover{opacity:0.85;transform:translateY(-1px);}
  .btn-mystic:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .mystic-result-card{margin-top:12px;background:linear-gradient(135deg,rgba(26,5,51,0.95),rgba(13,31,60,0.95));border:1px solid rgba(212,175,55,0.4);border-radius:8px;padding:18px 20px;color:#e8d5a3;font-size:0.88rem;line-height:1.9;white-space:pre-wrap;max-height:none;overflow:visible;}
  .mystic-result-label{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:#d4af37;margin-bottom:10px;}


/* ===== Supabase 履歴（Fullプラン限定） ===== */
.hist-section{width:100%;margin:16px auto 0;padding:16px 18px;border-radius:12px;background:var(--surface,#fff);border:1px solid var(--border,rgba(0,0,0,0.1));}
.hist-head{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent,#b87333);margin-bottom:10px;font-family:monospace;}
.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-card{padding:11px 13px;border-radius:9px;background:var(--bg,var(--paper,#f7f3ee));border:1px solid var(--border,rgba(0,0,0,0.08));cursor:pointer;transition:background 0.2s,border-color 0.2s;}
.hist-card:hover{border-color:var(--accent,#b87333);}
.hist-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.hist-card-date{font-size:0.66rem;font-family:monospace;opacity:0.55;color:var(--muted,#8a7e72);}
.hist-card-title{font-size:0.88rem;font-weight:600;margin-bottom:2px;color:var(--ink,var(--text,#1a1612));}
.hist-card-summary{font-size:0.75rem;color:var(--muted,#8a7e72);line-height:1.5;}
.hist-del{margin-left:auto;background:none;border:none;font-size:0.9rem;cursor:pointer;opacity:0.3;transition:opacity 0.2s;padding:1px 4px;border-radius:4px;}
.hist-del:hover{opacity:1;}
.hist-empty{font-size:0.75rem;color:var(--muted,#8a7e72);font-family:monospace;text-align:center;padding:12px 0;opacity:0.7;}
.hist-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.hist-modal{background:var(--surface,#fff);border-radius:16px;padding:22px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.25);border:1px solid var(--border,rgba(0,0,0,0.1));}
.hist-modal-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border,rgba(0,0,0,0.08));}
.hist-modal-date{font-size:0.66rem;font-family:monospace;opacity:0.55;margin-bottom:3px;color:var(--muted,#8a7e72);}
.hist-modal-title{font-size:1.1rem;font-weight:700;color:var(--ink,var(--text,#1a1612));}
.hist-modal-meta{font-size:0.7rem;color:var(--muted,#8a7e72);margin-top:3px;}
.hist-modal-close{margin-left:auto;background:none;border:1px solid var(--border,rgba(0,0,0,0.12));border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:0.84rem;color:var(--muted,#8a7e72);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}
.hist-modal-close:hover{background:var(--bg,rgba(0,0,0,0.04));}
.hist-modal-body{font-size:0.9rem;line-height:1.85;white-space:pre-wrap;color:var(--ink,var(--text,#1a1612));}

<script>
(function(){
const A='subscript-checker',W='https://orange-sound-354b.inverted-triangle-leef.workers.dev';
let _s=[];
function _isFull(){return !!(window.TomuAuth&&TomuAuth.getPlan&&TomuAuth.getPlan()==='full');}
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.histLoad=async function(){if(!_isFull()){const sec=document.getElementById('hist-section');if(sec)sec.style.display='none';return;}const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?app_id='+A+'&limit=5',{headers:{'X-Customer-Email':em}});const d=await r.json();_s=d.sessions||[];histRender(_s);}catch(x){}};
window.histRender=function(ss){const sec=document.getElementById('hist-section');const li=document.getElementById('hist-list');if(!sec||!li)return;if(!_isFull()){sec.style.display='none';return;}if(!ss.length){li.innerHTML='<p class="hist-empty">まだ履歴がありません</p>';sec.style.display='';return;}li.innerHTML=ss.map((s,i)=>{const sd=s.session_data||{},dt=new Date(s.created_at).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});return'<div class="hist-card" onclick="histOpen('+i+')"><div class="hist-card-meta"><span class="hist-card-date">'+dt+'</span><button class="hist-del" onclick="event.stopPropagation();histDel(\''+_e(s.id)+'\')">🗑</button></div><div class="hist-card-title">'+_e(sd.title||'—')+'</div>'+(sd.summary?'<div class="hist-card-summary">'+_e(sd.summary)+'</div>':'')+'</div>';}).join('');sec.style.display='';};
window.histOpen=function(i){const s=_s[i];if(!s)return;const sd=s.session_data||{};document.getElementById('hist-modal-date').textContent=new Date(s.created_at).toLocaleDateString('ja-JP',{year:'numeric',month:'numeric',day:'numeric'});document.getElementById('hist-modal-title').textContent=sd.title||'—';document.getElementById('hist-modal-meta').textContent=sd.meta||'';document.getElementById('hist-modal-body').textContent=sd.content||'';document.getElementById('hist-modal').style.display='flex';document.body.style.overflow='hidden';};
window.histClose=function(e){if(e&&e.target!==document.getElementById('hist-modal'))return;document.getElementById('hist-modal').style.display='none';document.body.style.overflow='';};
window.histDel=async function(id){if(!id||!confirm('この履歴を削除しますか？'))return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?id='+encodeURIComponent(id),{method:'DELETE',headers:{'X-Customer-Email':em}});if(r.ok)await histLoad();else alert('削除に失敗しました。');}catch(x){alert('通信エラー');}};
window.histSave=async function(d){if(!_isFull())return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{await fetch(W+'/api/history',{method:'POST',headers:{'Content-Type':'application/json','X-Customer-Email':em},body:JSON.stringify({app_id:A,session_data:d})});}catch(x){}};
document.addEventListener('DOMContentLoaded',function(){setTimeout(histLoad,800);});
document.addEventListener('tomu:unlocked',function(){setTimeout(histLoad,300);});
})();
</script>

<script>

function addItem() {
  const list = document.getElementById('sub-list');
  const item = document.createElement('div');
  item.className = 'sub-item';
  item.innerHTML = `
    <input aria-label="サービス名" class="sub-name" type="text" placeholder="サービス名" />
    <input aria-label="¥/月" class="sub-price" type="text" placeholder="¥/月" />
    <button class="del-btn" onclick="removeItem(this)">×</button>
  `;
  list.appendChild(item);
  item.querySelector('.sub-name').focus();
}

function removeItem(btn) {
  const items = document.querySelectorAll('.sub-item');
  if (items.length <= 1) return;
  btn.closest('.sub-item').remove();
}

function selectFreq(btn) {
  document.querySelectorAll('.freq-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
}

function toggleConcern(btn) {
  btn.classList.toggle('active');
}

async function analyze() {
  const items = document.querySelectorAll('.sub-item');
  const subs = [];
  items.forEach(item => {
    const name = item.querySelector('.sub-name').value.trim();
    const price = item.querySelector('.sub-price').value.trim();
    if (name) subs.push({ name, price: price || '不明' });
  });

  if (subs.length === 0) {
    showError('サブスクを1つ以上入力してください。');
    return;
  }

  const freq = document.querySelector('.freq-chip.active')?.textContent || '不明';
  const concerns = [...document.querySelectorAll('.concern-chip.active')].map(c => c.textContent).join('、');

  const subText = subs.map(s => `・${s.name}（${s.price}）`).join('\n');
  const prompt = `以下のサブスクリプション加入状況を分析して、断捨離レポートを作成してください。

【加入中のサブスク】
${subText}

【最近の使用頻度】${freq}

function setLoading(flag) {
  document.getElementById('loading').classList.toggle('show', flag);
  document.getElementById('submit-btn').disabled = flag;
}
function hideError() { document.getElementById('error-msg').classList.remove('show'); }
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideResult() { document.getElementById('result-card').classList.remove('show'); }
function showResult(text) {
  document.getElementById('result-body').textContent = text;
  if(text&&window.histSave){histSave({title:'サブスク断捨離レポート',summary:text.replace(/[#*>-]+/g,' ').slice(0,80),content:text,meta:''});setTimeout(histLoad,1000);}
  document.getElementById('result-card').classList.add('show');
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function callMystic(tool, args) {
  const MYSTIC_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev/mystic-bridge';
  const btn = document.querySelector('.btn-mystic');
  const wrap = document.getElementById('mystic-result');
  btn.disabled = true;
  btn.textContent = '✨ 星々に問いかけています…';
  wrap.innerHTML = '<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC</div>星々があなたのために語ります...</div>';
  try {
    const res = await fetch(MYSTIC_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ tool: tool, arguments: args })
    });
    const data = await res.json();
    const msg = (data.content && data.content[0] && data.content[0].text) || '占い結果を取得できませんでした。';
    const safe = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    wrap.innerHTML = `<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC より</div>${safe}</div>`;
  } catch(e) {
    wrap.innerHTML = '<div class="mystic-result-card">⚠ 星々との通信が途絶えました。しばらくしてからお試しください。</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ MYSTICで占う';
  }
}

// A-10 共通: AI生成に失敗したとき「再試行」ボタンを表示する（単発Lightアプリ用）
function tomuHideRetry(){ var b=document.getElementById('tomu-retry-bar'); if(b) b.remove(); }
function tomuShowRetry(fn){
  tomuHideRetry();
  var bar=document.createElement('div');
  bar.id='tomu-retry-bar';
  bar.setAttribute('role','alert');
  bar.style.cssText='position:fixed;left:50%;bottom:20px;transform:translateX(-50%);display:flex;align-items:center;gap:10px;max-width:92%;background:#fff;border:1px solid #fccaca;color:#c0392b;border-radius:24px;padding:8px 10px 8px 16px;font-size:13px;line-height:1.5;z-index:99999;box-shadow:0 6px 24px rgba(0,0,0,.18);font-family:inherit;';
  var span=document.createElement('span'); span.textContent='通信に失敗しました';
  var rbtn=document.createElement('button'); rbtn.type='button'; rbtn.textContent='再試行';
  rbtn.setAttribute('aria-label','直前のリクエストを再試行する');
  rbtn.style.cssText='flex-shrink:0;background:#c0392b;color:#fff;border:none;border-radius:16px;padding:6px 16px;font-family:inherit;font-size:12px;cursor:pointer;';
  rbtn.onclick=function(){ tomuHideRetry(); try{ if(typeof fn==='function') fn(); }catch(e){} };
  var cbtn=document.createElement('button'); cbtn.type='button'; cbtn.textContent='✕';
  cbtn.setAttribute('aria-label','閉じる');
  cbtn.style.cssText='flex-shrink:0;background:none;border:none;color:#c0392b;font-size:15px;line-height:1;cursor:pointer;padding:2px 4px;';
  cbtn.onclick=tomuHideRetry;
  bar.appendChild(span); bar.appendChild(rbtn); bar.appendChild(cbtn);
  document.body.appendChild(bar);
}
</script>
