<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のラッキーアクション — とむSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1612;
  --paper: #f7f3ee;
  --warm: #f0e8dc;
  --accent: #b87333;
  --accent2: #7a9e7e;
  --muted: #8a7e72;
  --border: #ddd5c8;
  --surface: #ffffff;
  --light-accent: #eedfc8;
  --gold: #c9963a;
  --gold-light: #f0d9aa;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ノイズ */
body::before {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ===== NAV ===== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(247,243,238,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 400;
  letter-spacing: .1em;
  color: var(--ink);
  text-decoration: none;
}

.nav-logo span { color: var(--accent); }

.nav-back {
  font-size: .72rem;
  letter-spacing: .08em;
  color: var(--muted);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
  transition: all .2s;
}

.nav-back:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ===== MAIN ===== */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 120px 24px 64px;
  max-width: 600px;
  margin: 0 auto;
  width: 100%;
}

/* ===== HEADER ===== */
.app-header {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeUp .6s ease both;
}

.app-icon {
  font-size: 2.4rem;
  margin-bottom: 16px;
  display: block;
  filter: drop-shadow(0 2px 8px rgba(184,115,51,.2));
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.app-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 400;
  letter-spacing: .05em;
  color: var(--ink);
  margin-bottom: 8px;
}

.app-subtitle {
  font-size: .78rem;
  letter-spacing: .12em;
  color: var(--muted);
  text-transform: uppercase;
}

/* ===== MOOD SELECTOR ===== */
.section-label {
  font-size: .7rem;
  letter-spacing: .14em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
  text-align: center;
}

.mood-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 100%;
  margin-bottom: 32px;
  animation: fadeUp .6s .1s ease both;
}

.mood-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 8px;
  cursor: pointer;
  text-align: center;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}

.mood-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--gold-light), transparent);
  opacity: 0;
  transition: opacity .2s;
}

.mood-btn:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(184,115,51,.1);
}

.mood-btn:hover::before { opacity: 1; }

.mood-btn.active {
  border-color: var(--accent);
  background: var(--light-accent);
  box-shadow: 0 2px 12px rgba(184,115,51,.15);
}

.mood-emoji {
  font-size: 1.4rem;
  display: block;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
}

.mood-label {
  font-size: .68rem;
  letter-spacing: .05em;
  color: var(--muted);
  position: relative;
  z-index: 1;
}

.mood-btn.active .mood-label { color: var(--accent); }

/* ===== FREE INPUT ===== */
.input-wrap {
  width: 100%;
  margin-bottom: 24px;
  animation: fadeUp .6s .2s ease both;
}

textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .85rem;
  font-weight: 300;
  color: var(--ink);
  resize: none;
  height: 90px;
  transition: border-color .2s, box-shadow .2s;
  line-height: 1.7;
}

textarea::placeholder { color: #bbb0a4; }

textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(184,115,51,.08);
}

/* ===== SUBMIT BTN ===== */
.submit-btn {
  width: 100%;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .82rem;
  font-weight: 400;
  letter-spacing: .1em;
  cursor: pointer;
  transition: all .25s;
  position: relative;
  overflow: hidden;
  animation: fadeUp .6s .3s ease both;
}

.submit-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent), transparent 60%);
  opacity: 0;
  transition: opacity .3s;
}

.submit-btn:hover:not(:disabled) {
  background: #2a2420;
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(26,22,18,.2);
}

.submit-btn:hover::after { opacity: .25; }

.submit-btn:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none;
}

.btn-inner {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* ===== LOADING ===== */
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(247,243,238,.3);
  border-top-color: var(--paper);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading .spinner { display: block; }
.loading .btn-text { opacity: .6; }

/* ===== RESULT CARD ===== */
.result-card {
  width: 100%;
  margin-top: 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px;
  position: relative;
  overflow: hidden;
  animation: cardReveal .5s cubic-bezier(.22,1,.36,1) both;
  display: none;
}

.result-card.visible { display: block; }

.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent2));
}

@keyframes cardReveal {
  from { opacity: 0; transform: translateY(20px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.result-label {
  font-size: .65rem;
  letter-spacing: .16em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.result-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.result-text {
  font-size: 1rem;
  line-height: 1.85;
  color: var(--ink);
  font-weight: 300;
  white-space: pre-wrap;
}

.result-star {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 1.2rem;
  opacity: .4;
  animation: twinkle 2s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: .3; transform: scale(1); }
  50% { opacity: .7; transform: scale(1.15); }
}

.result-footer {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.retry-btn {
  font-size: .72rem;
  letter-spacing: .08em;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 16px;
  cursor: pointer;
  transition: all .2s;
  font-family: 'Noto Sans JP', sans-serif;
}

.retry-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.powered {
  font-size: .62rem;
  color: var(--border);
  letter-spacing: .06em;
}

/* ===== ERROR ===== */
.error-msg {
  width: 100%;
  margin-top: 16px;
  background: #fff5f5;
  border: 1px solid #f5c6c6;
  border-radius: 10px;
  padding: 14px 18px;
  font-size: .8rem;
  color: #c0392b;
  display: none;
  animation: fadeUp .3s ease both;
}

.error-msg.visible { display: block; }

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 24px;
  font-size: .68rem;
  color: var(--border);
  letter-spacing: .06em;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== DECORATIVE STARS ===== */
.deco {
  position: fixed;
  pointer-events: none;
  opacity: .12;
  font-size: 1rem;
}
.deco-1 { top: 18%; left: 8%; animation: twinkle 3s .5s ease-in-out infinite; }
.deco-2 { top: 35%; right: 6%; animation: twinkle 4s 1s ease-in-out infinite; }
.deco-3 { bottom: 30%; left: 5%; animation: twinkle 3.5s 2s ease-in-out infinite; }
.deco-4 { bottom: 20%; right: 9%; animation: twinkle 2.8s .3s ease-in-out infinite; }
</style>
</head>
<body>

<div class="deco deco-1">✦</div>
<div class="deco deco-2">✧</div>
<div class="deco deco-3">✦</div>
<div class="deco deco-4">✧</div>

<nav>
  <a href="https://tomu-ai963.github.io/tomu-system/" class="nav-logo">とむ<span>SYSTEM</span></a>
  <a href="https://tomu-ai963.github.io/tomu-system/" class="nav-back">← 一覧へ</a>
</nav>

<main>
  <div class="app-header">
    <span class="app-icon">🍀</span>
    <h1 class="app-title">今日のラッキーアクション</h1>
    <p class="app-subtitle">Lucky Action Generator</p>
  </div>

  <p class="section-label">今日の気分は？</p>

  <div class="mood-grid" id="moodGrid">
    <button class="mood-btn" data-mood="元気いっぱい">
      <span class="mood-emoji">🌟</span>
      <span class="mood-label">元気いっぱい</span>
    </button>
    <button class="mood-btn" data-mood="ちょっと疲れ気味">
      <span class="mood-emoji">😪</span>
      <span class="mood-label">疲れ気味</span>
    </button>
    <button class="mood-btn" data-mood="やる気満々">
      <span class="mood-emoji">🔥</span>
      <span class="mood-label">やる気満々</span>
    </button>
    <button class="mood-btn" data-mood="のんびりしたい">
      <span class="mood-emoji">🌿</span>
      <span class="mood-label">のんびり</span>
    </button>
    <button class="mood-btn" data-mood="モヤモヤしている">
      <span class="mood-emoji">🌫️</span>
      <span class="mood-label">モヤモヤ</span>
    </button>
    <button class="mood-btn" data-mood="わくわくしている">
      <span class="mood-emoji">✨</span>
      <span class="mood-label">わくわく</span>
    </button>
  </div>

  <div class="input-wrap">
    <textarea
      id="extraInput"
      placeholder="もう少し教えてください（任意）— 例：今日は山仕事の予定、大事な打ち合わせがある…"
    ></textarea>
  </div>

  <button class="submit-btn" id="submitBtn" disabled>
    <div class="btn-inner">
      <div class="spinner" id="spinner"></div>
      <span class="btn-text" id="btnText">気分を選んでください</span>
    </div>
  </button>

  <div class="result-card" id="resultCard">
    <span class="result-star">✦</span>
    <div class="result-label">Today's Lucky Action</div>
    <div class="result-text" id="resultText"></div>
    <div class="result-footer">
      <button class="retry-btn" id="retryBtn">もう一度引く</button>
      <span class="powered">powered by とむSYSTEM</span>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
</main>

<footer>© 2026 とむSYSTEM — All apps powered by Claude</footer>

<script>
const WORKER_URL = "https://orange-sound-354b.inverted-triangle-leef.workers.dev/";

const moodGrid   = document.getElementById("moodGrid");
const submitBtn  = document.getElementById("submitBtn");
const spinner    = document.getElementById("spinner");
const btnText    = document.getElementById("btnText");
const resultCard = document.getElementById("resultCard");
const resultText = document.getElementById("resultText");
const errorMsg   = document.getElementById("errorMsg");
const retryBtn   = document.getElementById("retryBtn");
const extraInput = document.getElementById("extraInput");

let selectedMood = null;

// 気分ボタン選択
moodGrid.addEventListener("click", (e) => {
  const btn = e.target.closest(".mood-btn");
  if (!btn) return;

  document.querySelectorAll(".mood-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedMood = btn.dataset.mood;

  submitBtn.disabled = false;
  btnText.textContent = "ラッキーアクションを引く ✦";
  resultCard.classList.remove("visible");
  errorMsg.classList.remove("visible");
});

// 送信
async function fetchLucky() {
  if (!selectedMood) return;

  const extra = extraInput.value.trim();
  const inputText = extra
    ? `今日の気分：${selectedMood}。補足：${extra}`
    : `今日の気分：${selectedMood}`;

  // ローディング状態
  submitBtn.disabled = true;
  submitBtn.classList.add("loading");
  btnText.textContent = "引いています…";
  resultCard.classList.remove("visible");
  errorMsg.classList.remove("visible");

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        appType: "lucky-action",
        input: inputText
      })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error || "Worker error");
    }

    resultText.textContent = data.result;
    resultCard.classList.add("visible");

  } catch (err) {
    errorMsg.textContent = `エラーが発生しました：${err.message}`;
    errorMsg.classList.add("visible");
  } finally {
    submitBtn.disabled = false;
    submitBtn.classList.remove("loading");
    btnText.textContent = "ラッキーアクションを引く ✦";
  }
}

submitBtn.addEventListener("click", fetchLucky);
retryBtn.addEventListener("click", fetchLucky);
</script>
</body>
</html>
