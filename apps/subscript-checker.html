<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サブスク断捨離チェッカー | とむSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --border: #e0d9d0;
    --text: #1a1814;
    --muted: #9a9089;
    --accent: #c0392b;
    --accent-light: #fdf0ef;
    --gold: #b8860b;
    --gold-light: #faf6ee;
    --tag-bg: #f0ede8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--text);
  }
  .logo span { color: var(--gold); }
  .back-btn {
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    transition: all 0.2s;
  }
  .back-btn:hover { background: var(--tag-bg); }

  /* Hero */
  .hero {
    text-align: center;
    padding: 40px 24px 32px;
  }
  .hero-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  .hero h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .hero h1 em {
    color: var(--accent);
    font-style: normal;
  }
  .hero p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin: 0 16px 16px;
    padding: 24px 20px;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Subscriptions list */
  .sub-list { display: flex; flex-direction: column; gap: 10px; }

  .sub-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    background: var(--tag-bg);
    border-radius: 10px;
    padding: 10px 12px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .sub-name {
    font-size: 14px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    width: 100%;
    outline: none;
  }
  .sub-name::placeholder { color: var(--muted); }

  .sub-price {
    font-size: 13px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    color: var(--gold);
    width: 70px;
    text-align: right;
    outline: none;
  }
  .sub-price::placeholder { color: #ccc; font-size: 12px; }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.2s;
  }
  .del-btn:hover { color: var(--accent); }

  .add-btn {
    width: 100%;
    margin-top: 12px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .add-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-light); }

  /* Frequency selector */
  .freq-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .freq-chip {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }
  .freq-chip.active {
    background: var(--text);
    color: white;
    border-color: var(--text);
  }

  /* Concern tags */
  .concern-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .concern-chip {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    text-align: center;
    line-height: 1.4;
  }
  .concern-chip.active {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Submit */
  .submit-btn {
    width: calc(100% - 32px);
    margin: 8px 16px 0;
    padding: 16px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .submit-btn:hover { background: #333; }
  .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }

  /* Result */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin: 16px 16px 0;
    padding: 24px 20px;
    display: none;
  }
  .result-card.show { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .result-header h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 600;
  }

  .result-body {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .loading.show { display: block; }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: var(--muted); }

  /* Error */
  .error-msg {
    background: var(--accent-light);
    border: 1px solid #f5c6c2;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--accent);
    margin: 12px 16px 0;
    display: none;
  }
  .error-msg.show { display: block; }

  /* Footer */
  .footer-label {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    margin-left: 16px;
    margin-right: 16px;
  }

</style>
  <script src="/common/header.js"></script>
</head>
<body>

<header class="header">
  <div class="logo">とむ<span>SYSTEM</span></div>
  <a href="../index.html" class="back-btn">← 一覧へ</a>
</header>

<div class="hero">
  <span class="hero-icon">✂️</span>
  <h1>サブスク<em>断捨離</em>チェッカー</h1>
  <p>加入中のサブスクを入力するだけ。<br>AIが「解約すべき」を正直に教えます。</p>
</div>

<!-- サブスク入力 -->
<div class="card">
  <div class="card-label">加入中のサブスク</div>
  <div class="sub-list" id="sub-list">
    <div class="sub-item">
      <input class="sub-name" type="text" placeholder="例）Netflix" />
      <input class="sub-price" type="text" placeholder="¥/月" />
      <button class="del-btn" onclick="removeItem(this)">×</button>
    </div>
    <div class="sub-item">
      <input class="sub-name" type="text" placeholder="例）Spotify" />
      <input class="sub-price" type="text" placeholder="¥/月" />
      <button class="del-btn" onclick="removeItem(this)">×</button>
    </div>
    <div class="sub-item">
      <input class="sub-name" type="text" placeholder="例）Amazon Prime" />
      <input class="sub-price" type="text" placeholder="¥/月" />
      <button class="del-btn" onclick="removeItem(this)">×</button>
    </div>
  </div>
  <button class="add-btn" onclick="addItem()">＋ サブスクを追加</button>
</div>

<!-- 使用頻度 -->
<div class="card">
  <div class="card-label">最近の使用頻度（全体的に）</div>
  <div class="freq-group" id="freq-group">
    <button class="freq-chip" onclick="selectFreq(this)">ほぼ毎日</button>
    <button class="freq-chip" onclick="selectFreq(this)">週2〜3回</button>
    <button class="freq-chip" onclick="selectFreq(this)">週1回くらい</button>
    <button class="freq-chip" onclick="selectFreq(this)">月数回</button>
    <button class="freq-chip" onclick="selectFreq(this)">ほとんど使ってない</button>
  </div>
</div>

<!-- 悩み -->
<div class="card">
  <div class="card-label">気になっていること（複数可）</div>
  <div class="concern-grid" id="concern-grid">
    <button class="concern-chip" onclick="toggleConcern(this)">💸 月の出費が多い</button>
    <button class="concern-chip" onclick="toggleConcern(this)">😶 使ってない気がする</button>
    <button class="concern-chip" onclick="toggleConcern(this)">🔁 似たサービスが重複</button>
    <button class="concern-chip" onclick="toggleConcern(this)">📱 使いこなせていない</button>
    <button class="concern-chip" onclick="toggleConcern(this)">🎯 目的が曖昧になった</button>
    <button class="concern-chip" onclick="toggleConcern(this)">💡 代替手段がありそう</button>
  </div>
</div>

<button class="submit-btn" id="submit-btn" onclick="analyze()">✂️ 断捨離診断する</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>AIがサブスクを仕分け中…</p>
</div>

<div class="error-msg" id="error-msg"></div>

<div class="result-card" id="result-card">
  <div class="result-header">
    <span style="font-size:24px;">📋</span>
    <h2>断捨離レポート</h2>
  </div>
  <div class="result-body" id="result-body"></div>
</div>

<div class="footer-label">とむSYSTEM — LIGHT PLAN</div>

<script src="../tomu-login.js"></script>
<script>

function addItem() {
  const list = document.getElementById('sub-list');
  const item = document.createElement('div');
  item.className = 'sub-item';
  item.innerHTML = `
    <input class="sub-name" type="text" placeholder="サービス名" />
    <input class="sub-price" type="text" placeholder="¥/月" />
    <button class="del-btn" onclick="removeItem(this)">×</button>
  `;
  list.appendChild(item);
  item.querySelector('.sub-name').focus();
}

function removeItem(btn) {
  const items = document.querySelectorAll('.sub-item');
  if (items.length <= 1) return;
  btn.closest('.sub-item').remove();
}

function selectFreq(btn) {
  document.querySelectorAll('.freq-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
}

function toggleConcern(btn) {
  btn.classList.toggle('active');
}

async function analyze() {
  const items = document.querySelectorAll('.sub-item');
  const subs = [];
  items.forEach(item => {
    const name = item.querySelector('.sub-name').value.trim();
    const price = item.querySelector('.sub-price').value.trim();
    if (name) subs.push({ name, price: price || '不明' });
  });

  if (subs.length === 0) {
    showError('サブスクを1つ以上入力してください。');
    return;
  }

  const freq = document.querySelector('.freq-chip.active')?.textContent || '不明';
  const concerns = [...document.querySelectorAll('.concern-chip.active')].map(c => c.textContent).join('、');

  const subText = subs.map(s => `・${s.name}（${s.price}）`).join('\n');
  const prompt = `以下のサブスクリプション加入状況を分析して、断捨離レポートを作成してください。

【加入中のサブスク】
${subText}

【最近の使用頻度】${freq}
【気になっていること】${concerns || 'とくになし'}

以下の構成で、具体的かつ正直にアドバイスしてください：

① 今すぐ解約候補（理由付き）
② 継続おすすめ（理由付き）
③ 要検討（使い方次第）
④ 合計削減できる金額の目安
⑤ ひと言アドバイス

親しみやすい口調で、歯に衣着せない正直なコメントをお願いします。`;

  setLoading(true);
  hideError();
  hideResult();

  try {
    const response = await fetch('https://orange-sound-354b.inverted-triangle-leef.workers.dev/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        appType: 'subscript-checker',
        input: prompt,
        email: TomuAuth.getEmail()
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      if (err.error === 'subscription_required' || err.error === 'login_required') {
        TomuAuth.showOverlay();
        return;
      }
      throw new Error(`HTTP ${response.status}`);
    }
    const data = await response.json();
    if (data.error) throw new Error(data.error);
    const text = data.result || '';
    if (!text) throw new Error('応答が空です');

    showResult(text);
  } catch (e) {
    showError('エラーが発生しました。もう一度お試しください。');
    console.error(e);
  } finally {
    setLoading(false);
  }
}

function setLoading(flag) {
  document.getElementById('loading').classList.toggle('show', flag);
  document.getElementById('submit-btn').disabled = flag;
}
function hideError() { document.getElementById('error-msg').classList.remove('show'); }
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideResult() { document.getElementById('result-card').classList.remove('show'); }
function showResult(text) {
  document.getElementById('result-body').textContent = text;
  document.getElementById('result-card').classList.add('show');
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
