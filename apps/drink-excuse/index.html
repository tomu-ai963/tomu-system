<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲み過ぎ言い訳アシスト — とむSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400;500&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1612;
  --paper: #f7f3ee;
  --muted: #8a7e72;
  --night: #0a0e08;
  --ember: #5aaa4a;
  --ember-glow: #88cc76;
  --flame: #3a8a2a;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  min-height: 100vh;
  background: var(--night);
  color: var(--paper);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  line-height: 1.8;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

body::after {
  content:'';
  position:fixed;
  bottom: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 80vw;
  height: 60vh;
  background: radial-gradient(ellipse at center bottom, rgba(90,170,74,0.18) 0%, rgba(58,138,42,0.08) 40%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: emberPulse 4s ease-in-out infinite;
}

@keyframes emberPulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleY(1); }
  50% { opacity: 1; transform: translateX(-50%) scaleY(1.08); }
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10,14,8,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(90,170,74,0.2);
}

.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--paper);
  text-decoration: none;
}
.nav-logo span { color: var(--ember-glow); }

.nav-badge {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid rgba(90,170,74,0.3);
  padding: 4px 12px;
  border-radius: 20px;
}

main {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 24px 60px;
}

.hero {
  text-align: center;
  margin-bottom: 56px;
  animation: fadeUp 0.9s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}

.hero-icon {
  font-size: 3.2rem;
  display: block;
  margin-bottom: 20px;
  animation: iconFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(90,170,74,0.5));
}

@keyframes iconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.hero-title {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 800;
  letter-spacing: 0.05em;
  color: var(--paper);
  line-height: 1.2;
  margin-bottom: 12px;
}

.hero-title .accent { color: var(--ember-glow); }

.hero-sub {
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.hero-desc {
  font-size: 0.95rem;
  color: rgba(247,243,238,0.6);
  max-width: 380px;
  margin: 0 auto;
  line-height: 1.9;
}

.card {
  width: 100%;
  max-width: 500px;
  background: rgba(247,243,238,0.04);
  border: 1px solid rgba(90,170,74,0.25);
  border-radius: 4px;
  padding: 40px 36px;
  backdrop-filter: blur(8px);
  animation: fadeUp 0.9s ease 0.2s both;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--ember), transparent);
}

.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}

.field-label {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ember-glow);
  font-weight: 400;
}

.field-input {
  background: rgba(247,243,238,0.06);
  border: 1px solid rgba(90,170,74,0.3);
  border-radius: 2px;
  padding: 14px 16px;
  color: var(--paper);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.95rem;
  font-weight: 300;
  width: 100%;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}

.field-input::placeholder { color: rgba(247,243,238,0.25); }

.field-input:focus {
  border-color: var(--ember);
  background: rgba(90,170,74,0.08);
}

.btn-generate {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid var(--ember);
  border-radius: 2px;
  color: var(--ember-glow);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.btn-generate::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--ember);
  opacity: 0;
  transition: opacity 0.3s;
}

.btn-generate:hover::before { opacity: 0.12; }
.btn-generate:hover { letter-spacing: 0.3em; border-color: var(--ember-glow); }
.btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-generate:disabled:hover::before { opacity: 0; }
.btn-generate:disabled:hover { letter-spacing: 0.25em; }

.btn-text { position: relative; z-index: 1; }

.result-area {
  margin-top: 32px;
  padding-top: 28px;
  border-top: 1px solid rgba(90,170,74,0.15);
  display: none;
  animation: fadeUp 0.5s ease both;
}

.result-area.visible { display: block; }

.result-label {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ember);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.result-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(90,170,74,0.2);
}

.result-text {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.05rem;
  font-weight: 400;
  color: var(--paper);
  line-height: 2;
  white-space: pre-wrap;
}

.loading-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  padding: 12px 0;
}

.loading-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ember);
  animation: dotBounce 1.2s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.error-msg {
  font-size: 0.82rem;
  color: #e07070;
  padding: 12px;
  border: 1px solid rgba(224,112,112,0.3);
  border-radius: 2px;
  background: rgba(224,112,112,0.05);
}

.tips-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.tip-chip {
  font-size: 0.7rem;
  color: var(--muted);
  border: 1px solid rgba(138,126,114,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.tip-chip:hover {
  border-color: var(--ember);
  color: var(--ember-glow);
  background: rgba(90,170,74,0.06);
}

footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 24px;
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  color: rgba(138,126,114,0.5);
}

footer a {
  color: rgba(90,170,74,0.5);
  text-decoration: none;
  transition: color 0.2s;
}

footer a:hover { color: var(--ember-glow); }

@media (max-width: 520px) {
  .card { padding: 28px 20px; }
  nav { padding: 16px 20px; }
}

/* ===== MYSTIC SECTION ===== */
.mystic-section{margin-top:20px;padding-top:16px;border-top:1px solid rgba(212,175,55,0.2);}
.btn-mystic{width:100%;background:linear-gradient(135deg,#1a0533,#0d1f3c);color:#d4af37;border:1px solid #d4af37;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;transition:opacity 0.2s,transform 0.1s;font-family:inherit;letter-spacing:0.05em;margin-top:8px;}
.btn-mystic:hover{opacity:0.85;transform:translateY(-1px);}

.mystic-result-card{margin-top:12px;background:linear-gradient(135deg,rgba(26,5,51,0.95),rgba(13,31,60,0.95));border:1px solid rgba(212,175,55,0.4);border-radius:8px;padding:18px 20px;color:#e8d5a3;font-size:0.88rem;line-height:1.9;white-space:pre-wrap;max-height:none;overflow:visible;}
.mystic-result-label{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:#d4af37;margin-bottom:10px;}

/* ===== Supabase 履歴（Fullプラン限定） ===== */
.hist-section{width:100%;max-width:500px;margin:20px auto 0;padding:20px 24px;border-radius:4px;background:rgba(247,243,238,0.04);border:1px solid rgba(90,170,74,0.25);backdrop-filter:blur(8px);}
.hist-head{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--ember);margin-bottom:12px;}
.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-card{padding:12px 14px;border-radius:3px;background:rgba(247,243,238,0.05);border:1px solid rgba(90,170,74,0.18);cursor:pointer;transition:background 0.2s,border-color 0.2s;}
.hist-card:hover{background:rgba(90,170,74,0.08);border-color:var(--ember);}
.hist-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.hist-card-date{font-size:0.66rem;font-family:monospace;opacity:0.5;color:var(--muted);}
.hist-card-title{font-size:0.9rem;font-weight:400;margin-bottom:3px;color:var(--paper);font-family:'Shippori Mincho',serif;}
.hist-card-summary{font-size:0.76rem;color:rgba(247,243,238,0.5);line-height:1.5;}
.hist-del{margin-left:auto;background:none;border:none;font-size:0.9rem;cursor:pointer;opacity:0.28;transition:opacity 0.2s;padding:1px 4px;border-radius:4px;color:var(--paper);}
.hist-del:hover{opacity:1;}
.hist-empty{font-size:0.75rem;color:var(--muted);font-family:monospace;text-align:center;padding:12px 0;opacity:0.6;}
.hist-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.hist-modal{background:#12160f;border-radius:4px;padding:24px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.6);border:1px solid rgba(90,170,74,0.3);}
.hist-modal-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(90,170,74,0.2);}

.hist-modal-title{font-size:1.1rem;font-weight:400;color:var(--paper);font-family:'Shippori Mincho',serif;}
.hist-modal-meta{font-size:0.7rem;color:var(--muted);margin-top:3px;}
.hist-modal-close{margin-left:auto;background:none;border:1px solid rgba(90,170,74,0.3);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:0.84rem;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}
.hist-modal-close:hover{background:rgba(90,170,74,0.12);}
.hist-modal-body{font-size:0.92rem;line-height:1.9;white-space:pre-wrap;color:var(--paper);font-family:'Shippori Mincho',serif;}

<body>

<nav>

</nav>

<main>
  <div class="hero">
    <span class="hero-icon">🍺</span>
    <p class="hero-sub">Tomu System — Light</p>
    <h1 class="hero-title">飲み過ぎ<span class="accent">言い訳アシスト</span></h1>
    <p class="hero-desc">飲み過ぎた状況と翌日の予定を入力するだけ。<br>ユーモアある言い訳と乗り切り方を提案します。</p>
  </div>

  <div class="card">
    <div class="tips-row">
      <span class="tip-chip" onclick="fillExample('忘年会でビールを飲みすぎた', '午前10時に重要な会議がある')">🎉 忘年会×会議</span>
      <span class="tip-chip" onclick="fillExample('接待でお酒を断れずに飲みすぎた', '翌日にプレゼンがある')">🤝 接待×プレゼン</span>
      <span class="tip-chip" onclick="fillExample('同窓会で羽目を外して飲みすぎた', '普通に出勤しなければいけない')">🎓 同窓会×出勤</span>
      <span class="tip-chip" onclick="fillExample('家でひとり飲みしすぎた', '子供の習い事の送り迎えがある')">🏠 家飲み×家族</span>
    </div>

    <div class="field">
      <label class="field-label" for="drunk-situation">飲み過ぎた状況</label>
      <input aria-label="例：昨夜の忘年会でビールを飲みすぎた" class="field-input" id="drunk-situation" type="text" placeholder="例：昨夜の忘年会でビールを飲みすぎた" maxlength="100">
    </div>

    <div class="field">
      <label class="field-label" for="next-plan">翌日の予定</label>
      <input aria-label="例：午前10時から大事な会議がある" class="field-input" id="next-plan" type="text" placeholder="例：午前10時から大事な会議がある" maxlength="100">
    </div>

    <button class="btn-generate" id="btn" onclick="generate()">
      <span class="btn-text">言い訳と乗り切り方を考える</span>
    </button>

      <div class="result-label">言い訳 & 乗り切りプラン</div>

<script>
const WORKER_URL = "https://orange-sound-354b.inverted-triangle-leef.workers.dev/";

function fillExample(situation, plan) {
  document.getElementById('drunk-situation').value = situation;
  document.getElementById('next-plan').value = plan;
}

async function generate() {
  const situation = document.getElementById('drunk-situation').value.trim();
  const plan = document.getElementById('next-plan').value.trim();

  if (!situation || !plan) {
    shakeCard();
    return;
  }

  const btn = document.getElementById('btn');
  const resultArea = document.getElementById('result');
  const resultText = document.getElementById('result-text');

  btn.disabled = true;
  btn.querySelector('.btn-text').textContent = '考え中...';
  resultArea.classList.add('visible');
  resultText.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        appType: 'drink-excuse',
        input: `飲み過ぎた状況: ${situation}\n翌日の予定: ${plan}`,
        email: TomuAuth.getEmail()
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (err.error === 'subscription_required' || err.error === 'login_required') {
        TomuAuth.showOverlay();
        return;
      }
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const _res = data.result || '提案を生成できませんでした。';
    typewrite(resultText, _res);

    if (data.result && window.histSave) {
      histSave({
        title: situation.slice(0, 30) + (situation.length > 30 ? '…' : ''),
        summary: _res.slice(0, 80) + (_res.length > 80 ? '…' : ''),
        content: _res,
        meta: `翌日: ${plan}`
      });
      setTimeout(histLoad, 1000);
    }

  } catch (err) {
    resultText.innerHTML = `<div class="error-msg">⚠ 通信エラーが発生しました。<br>しばらくしてからもう一度お試しください。<br><small>${err.message}</small></div>`;
    tomuShowRetry(generate);
  } finally {
    btn.disabled = false;
    btn.querySelector('.btn-text').textContent = 'もう一度考える';
  }
}

function typewrite(el, text) {
  el.textContent = '';
  let i = 0;
  const interval = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 28);
}

function shakeCard() {
  const card = document.querySelector('.card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'shake 0.4s ease';
  setTimeout(() => { card.style.animation = ''; }, 400);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) generate();
});

const style = document.createElement('style');
style.textContent = `
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}`;
document.head.appendChild(style);

async function callMystic(tool, args) {
  const MYSTIC_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev/mystic-bridge';
  const btn = document.querySelector('.btn-mystic');
  const wrap = document.getElementById('mystic-result');
  btn.disabled = true;
  btn.textContent = '✨ 星々に問いかけています…';
  wrap.innerHTML = '<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC</div>星々があなたのために語ります...</div>';
  try {
    const res = await fetch(MYSTIC_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ tool: tool, arguments: args })
    });
    const data = await res.json();
    const msg = (data.content && data.content[0] && data.content[0].text) || '占い結果を取得できませんでした。';
    const safe = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    wrap.innerHTML = `<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC より</div>${safe}</div>`;
  } catch(e) {
    wrap.innerHTML = '<div class="mystic-result-card">⚠ 星々との通信が途絶えました。しばらくしてからお試しください。</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ MYSTICで占う';
  }
}
</script>

<script>
(function(){
const A='drink-excuse',W='https://orange-sound-354b.inverted-triangle-leef.workers.dev';
let _s=[];
function _isFull(){return !!(window.TomuAuth&&TomuAuth.getPlan&&TomuAuth.getPlan()==='full');}
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.histLoad=async function(){if(!_isFull()){const sec=document.getElementById('hist-section');if(sec)sec.style.display='none';return;}const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?app_id='+A+'&limit=5',{headers:{'X-Customer-Email':em}});const d=await r.json();_s=d.sessions||[];histRender(_s);}catch(x){}};
window.histRender=function(ss){const sec=document.getElementById('hist-section');const li=document.getElementById('hist-list');if(!sec||!li)return;if(!_isFull()){sec.style.display='none';return;}if(!ss.length){li.innerHTML='<p class="hist-empty">まだ履歴がありません</p>';sec.style.display='';return;}li.innerHTML=ss.map((s,i)=>{const sd=s.session_data||{},dt=new Date(s.created_at).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});return'<div class="hist-card" onclick="histOpen('+i+')"><div class="hist-card-meta"><span class="hist-card-date">'+dt+'</span><button class="hist-del" onclick="event.stopPropagation();histDel(\''+_e(s.id)+'\')">🗑</button></div><div class="hist-card-title">'+_e(sd.title||'—')+'</div>'+(sd.summary?'<div class="hist-card-summary">'+_e(sd.summary)+'</div>':'')+'</div>';}).join('');sec.style.display='';};
window.histOpen=function(i){const s=_s[i];if(!s)return;const sd=s.session_data||{};document.getElementById('hist-modal-date').textContent=new Date(s.created_at).toLocaleDateString('ja-JP',{year:'numeric',month:'numeric',day:'numeric'});document.getElementById('hist-modal-title').textContent=sd.title||'—';document.getElementById('hist-modal-meta').textContent=sd.meta||'';document.getElementById('hist-modal-body').textContent=sd.content||'';document.getElementById('hist-modal').style.display='flex';document.body.style.overflow='hidden';};
window.histClose=function(e){if(e&&e.target!==document.getElementById('hist-modal'))return;document.getElementById('hist-modal').style.display='none';document.body.style.overflow='';};
window.histDel=async function(id){if(!id||!confirm('この履歴を削除しますか？'))return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?id='+encodeURIComponent(id),{method:'DELETE',headers:{'X-Customer-Email':em}});if(r.ok)await histLoad();else alert('削除に失敗しました。');}catch(x){alert('通信エラー');}};
window.histSave=async function(d){if(!_isFull())return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{await fetch(W+'/api/history',{method:'POST',headers:{'Content-Type':'application/json','X-Customer-Email':em},body:JSON.stringify({app_id:A,session_data:d})});}catch(x){}};
document.addEventListener('DOMContentLoaded',function(){setTimeout(histLoad,800);});
document.addEventListener('tomu:unlocked',function(){setTimeout(histLoad,300);});
})();
</script>

<!-- とむSYSTEM 共通認証モジュール -->
<script src="../../tomu-login.js"></script>
<script>
// A-10 共通: AI生成に失敗したとき「再試行」ボタンを表示する（単発Lightアプリ用）
function tomuHideRetry(){ var b=document.getElementById('tomu-retry-bar'); if(b) b.remove(); }
function tomuShowRetry(fn){
  tomuHideRetry();
  var bar=document.createElement('div');
  bar.id='tomu-retry-bar';
  bar.setAttribute('role','alert');
  bar.style.cssText='position:fixed;left:50%;bottom:20px;transform:translateX(-50%);display:flex;align-items:center;gap:10px;max-width:92%;background:#fff;border:1px solid #fccaca;color:#c0392b;border-radius:24px;padding:8px 10px 8px 16px;font-size:13px;line-height:1.5;z-index:99999;box-shadow:0 6px 24px rgba(0,0,0,.18);font-family:inherit;';
  var span=document.createElement('span'); span.textContent='通信に失敗しました';
  var rbtn=document.createElement('button'); rbtn.type='button'; rbtn.textContent='再試行';
  rbtn.setAttribute('aria-label','直前のリクエストを再試行する');
  rbtn.style.cssText='flex-shrink:0;background:#c0392b;color:#fff;border:none;border-radius:16px;padding:6px 16px;font-family:inherit;font-size:12px;cursor:pointer;';
  rbtn.onclick=function(){ tomuHideRetry(); try{ if(typeof fn==='function') fn(); }catch(e){} };
  var cbtn=document.createElement('button'); cbtn.type='button'; cbtn.textContent='✕';
  cbtn.setAttribute('aria-label','閉じる');
  cbtn.style.cssText='flex-shrink:0;background:none;border:none;color:#c0392b;font-size:15px;line-height:1;cursor:pointer;padding:2px 4px;';
  cbtn.onclick=tomuHideRetry;
  bar.appendChild(span); bar.appendChild(rbtn); bar.appendChild(cbtn);
  document.body.appendChild(bar);
}
</script>
</body>
</html>
