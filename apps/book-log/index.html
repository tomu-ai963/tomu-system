<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一言読書録 — とむSYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400;500&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:      #1a1612;
  --paper:    #f7f3ee;
  --warm:     #f0e8dc;
  --accent:   #b87333;
  --accent2:  #7a9e7e;
  --muted:    #8a7e72;
  --border:   #ddd5c8;
  --surface:  #ffffff;
  --light-accent: #eedfc8;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  line-height: 1.8;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ノイズテクスチャ */
body::before {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ===== NAV ===== */
nav {
  position: fixed;
  top:0; left:0; right:0;
  z-index:100;
  padding: 18px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(247,243,238,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--ink);
  text-decoration: none;
}
.nav-logo span { color: var(--accent); }

.nav-back {
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-back:hover { color: var(--accent); }

/* ===== メイン ===== */
main {
  padding-top: 100px;
  max-width: 680px;
  margin: 0 auto;
  padding-left: 24px;
  padding-right: 24px;
  padding-bottom: 80px;
}

/* ===== ヘッダーブロック ===== */
.app-header {
  text-align: center;
  margin-bottom: 52px;
  animation: fadeUp 0.7s ease both;
}

.app-icon {
  font-size: 2.4rem;
  margin-bottom: 16px;
  display: block;
  opacity: 0.8;
}

.app-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--ink);
  margin-bottom: 8px;
}
.app-title em {
  font-style: italic;
  color: var(--accent);
}

.app-subtitle {
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

.app-desc {
  font-size: 0.88rem;
  color: var(--muted);
  max-width: 400px;
  margin: 0 auto;
  line-height: 1.9;
}

/* ===== フォームカード ===== */
.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 40px 44px;
  margin-bottom: 32px;
  animation: fadeUp 0.7s 0.15s ease both;
  position: relative;
}

/* 左上コーナー装飾 */
.form-card::before {
  content:'';
  position:absolute;
  top: -1px; left: -1px;
  width: 24px; height: 24px;
  border-top: 2px solid var(--accent);
  border-left: 2px solid var(--accent);
}

.field {
  margin-bottom: 28px;
}

label {
  display: block;
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  font-weight: 400;
}

input[type="text"],
textarea {
  width: 100%;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 1px;
  padding: 14px 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--ink);
  transition: border-color .25s, background .25s;
  outline: none;
  resize: none;
  line-height: 1.8;
}

input[type="text"]:focus,
textarea:focus {
  border-color: var(--accent);
  background: var(--surface);
}

input[type="text"]::placeholder,
textarea::placeholder {
  color: var(--border);
}

/* 送信ボタン */
.btn-generate {
  width: 100%;
  padding: 16px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 1px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .25s, transform .1s;
  position: relative;
  overflow: hidden;
}
.btn-generate:hover {
  background: var(--accent);
}
.btn-generate:active {
  transform: scale(0.99);
}
.btn-generate:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  background: var(--muted);
}

/* ローディング */
.loading-dots {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}
.loading-dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--paper);
  animation: dot 1.2s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }

/* ===== 結果エリア ===== */
.result-area {
  display: none;
  animation: fadeUp 0.5s ease both;
}
.result-area.visible { display: block; }

/* 名言カード */
.quote-card {
  background: var(--warm);
  border: 1px solid var(--light-accent);
  border-radius: 2px;
  padding: 44px 48px;
  text-align: center;
  position: relative;
  margin-bottom: 20px;
}

/* 引用符装飾 */
.quote-card::before {
  content: '"';
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 6rem;
  color: var(--light-accent);
  position: absolute;
  top: -10px; left: 20px;
  line-height: 1;
  pointer-events: none;
}

.quote-book {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.quote-book::before,
.quote-book::after {
  content:'';
  flex:1;
  max-width:50px;
  height:1px;
  background: var(--border);
}

.quote-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  font-weight: 400;
  line-height: 1.9;
  color: var(--ink);
  letter-spacing: 0.03em;
  position: relative;
  z-index: 1;
}

.quote-date {
  margin-top: 24px;
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  color: var(--muted);
}

/* アクションボタン群 */
.result-actions {
  display: flex;
  gap: 12px;
}

.btn-copy,
.btn-reset {
  flex: 1;
  padding: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  border-radius: 1px;
  cursor: pointer;
  transition: all .2s;
  border: 1px solid var(--border);
}

.btn-copy {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.btn-copy:hover { background: var(--accent); border-color: var(--accent); }

.btn-reset {
  background: transparent;
  color: var(--muted);
}
.btn-reset:hover { border-color: var(--ink); color: var(--ink); }

/* ===== 履歴セクション ===== */
.history-section {
  margin-top: 56px;
  animation: fadeUp 0.7s 0.3s ease both;
}

.section-label {
  font-size: 0.68rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-clear-history {
  background: none;
  border: none;
  font-size: 0.66rem;
  letter-spacing: 0.15em;
  color: var(--border);
  cursor: pointer;
  transition: color .2s;
  text-transform: uppercase;
}
.btn-clear-history:hover { color: var(--accent); }

.history-empty {
  text-align: center;
  color: var(--border);
  font-size: 0.8rem;
  padding: 32px;
  letter-spacing: 0.1em;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.history-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 1px;
  padding: 22px 26px;
  display: grid;
  gap: 8px;
  transition: border-color .2s;
  cursor: default;
}
.history-item:hover { border-color: var(--light-accent); }

.history-book {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
}

.history-quote {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--ink);
  line-height: 1.7;
}

.history-meta {
  font-size: 0.65rem;
  color: var(--border);
  letter-spacing: 0.12em;
}

/* ===== フッター ===== */
footer {
  text-align: center;
  padding: 40px 24px;
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  color: var(--border);
  border-top: 1px solid var(--border);
  text-transform: uppercase;
}
footer a { color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--accent); }

/* ===== アニメーション ===== */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes dot {
  0%,80%,100% { transform:scale(0.6); opacity:0.4; }
  40%          { transform:scale(1);   opacity:1; }
}

/* ===== モバイル ===== */
@media (max-width:600px) {
  nav { padding: 16px 20px; }
  main { padding-top:80px; padding-left:16px; padding-right:16px; }
  .form-card { padding: 28px 22px; }
  .quote-card { padding: 36px 24px; }
  .quote-card::before { font-size: 4rem; }
}

/* ===== MYSTIC SECTION ===== */
.mystic-section{margin-top:20px;padding-top:16px;border-top:1px solid rgba(212,175,55,0.2);}
.btn-mystic{width:100%;background:linear-gradient(135deg,#1a0533,#0d1f3c);color:#d4af37;border:1px solid #d4af37;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;transition:opacity 0.2s,transform 0.1s;font-family:inherit;letter-spacing:0.05em;margin-top:8px;}
.btn-mystic:hover{opacity:0.85;transform:translateY(-1px);}
.btn-mystic:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.mystic-result-card{margin-top:12px;background:linear-gradient(135deg,rgba(26,5,51,0.95),rgba(13,31,60,0.95));border:1px solid rgba(212,175,55,0.4);border-radius:8px;padding:18px 20px;color:#e8d5a3;font-size:0.88rem;line-height:1.9;white-space:pre-wrap;max-height:none;overflow:visible;}
.mystic-result-label{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:#d4af37;margin-bottom:10px;}

/* ===== Supabase 履歴 ===== */
.hist-section{margin:12px 0;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.4);border:1px solid rgba(0,0,0,0.06);}.hist-list{display:flex;flex-direction:column;gap:7px;margin-top:7px;}.hist-card{padding:10px 12px;border-radius:9px;background:rgba(255,255,255,0.6);border:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:background 0.2s;}.hist-card:hover{background:rgba(255,255,255,0.9);}.hist-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;}.hist-card-date{font-size:0.66rem;font-family:monospace;opacity:0.5;}.hist-card-title{font-size:0.87rem;font-weight:600;margin-bottom:2px;}.hist-card-summary{font-size:0.75rem;opacity:0.6;line-height:1.45;}.hist-del{margin-left:auto;background:none;border:none;font-size:0.9rem;cursor:pointer;opacity:0.28;transition:opacity 0.2s;padding:1px 4px;border-radius:4px;}.hist-del:hover{opacity:1;}.hist-empty{font-size:0.75rem;opacity:0.45;font-family:monospace;text-align:center;padding:12px 0;}.hist-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}.hist-modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.2);}.hist-modal-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(0,0,0,0.08);}.hist-modal-date{font-size:0.66rem;font-family:monospace;opacity:0.52;margin-bottom:3px;}.hist-modal-title{font-size:1.13rem;font-weight:700;}.hist-modal-meta{font-size:0.7rem;opacity:0.48;margin-top:3px;}.hist-modal-close{margin-left:auto;background:none;border:1px solid rgba(0,0,0,0.12);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:0.84rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}.hist-modal-close:hover{background:rgba(0,0,0,0.08);}.hist-modal-body{font-size:0.87rem;line-height:1.85;white-space:pre-wrap;}
</style>

  <a href="index.html" class="nav-logo">とむ<span>SYSTEM</span></a>

<main>

  <!-- ヘッダー -->
  <div class="app-header">
    <span class="app-icon">📖</span>
    <h1 class="app-title">一言<em>読書録</em></h1>
    <p class="app-subtitle">Book Log — とむSYSTEM</p>
    <p class="app-desc">本のタイトルと感想を入力すると、その本の本質を突いた「自分だけの座右の銘」を一文で生成します。</p>
  </div>

  <!-- フォームカード -->
  <div class="form-card">
    <div class="field">
      <label for="book-title">Book Title — 本のタイトル</label>
      <input type="text" id="book-title" placeholder="例：星の王子さま" maxlength="80">
    </div>
    <div class="field">
      <label for="book-impression">Impression — 感想・心に残ったこと</label>
      <textarea id="book-impression" rows="4" placeholder="例：大切なものは目に見えないという言葉が刺さった。大人になるにつれて忘れていたものを思い出させてくれた。"></textarea>
    </div>
    <button class="btn-generate" id="btn-generate" onclick="generate()">
      <span id="btn-label">Generate — 座右の銘を生成</span>
    </button>
  </div>

  <!-- 結果エリア -->
  <div class="result-area" id="result-area">
    <div class="quote-card">
      <div class="quote-book" id="result-book-title">タイトル</div>
      <div class="quote-text" id="result-quote">ここに座右の銘が入ります</div>
      <div class="quote-date" id="result-date"></div>
    </div>
    <div class="result-actions">
      <button class="btn-copy" onclick="copyQuote()">Copy — コピー</button>
      <button class="btn-reset" onclick="resetForm()">Reset — もう一度</button>
    </div>
    <!-- MYSTIC -->
    <div class="mystic-section">
      <button class="btn-mystic" onclick="callMystic('oracle_message',{feeling:'本を読んで心が動いた'})">✨ MYSTICで占う</button>
      <div id="mystic-result"></div>
    </div>
  </div>

  <div id="hist-section" class="hist-section" style="display:none;">
    <p style="font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.5;margin-bottom:8px;font-family:monospace;">Past Sessions — 履歴</p>
    <div id="hist-list" class="hist-list"></div>
  </div>

  <!-- 履歴 -->
  <div class="history-section" id="history-section" style="display:none">
    <div class="section-label">
      Reading Log — 読書録
      <button class="btn-clear-history" onclick="clearHistory()">Clear All</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

</main>

<script>
const WORKER_URL = "https://orange-sound-354b.inverted-triangle-leef.workers.dev/";
const HISTORY_KEY = "book_log_history";

let currentQuote = "";
let currentBook  = "";

async function generate() {
  const title      = document.getElementById("book-title").value.trim();
  const impression = document.getElementById("book-impression").value.trim();

  if (!title) {
    alert("本のタイトルを入力してください");
    return;
  }
  if (!impression) {
    alert("感想を入力してください");
    return;
  }

  const btn   = document.getElementById("btn-generate");
  const label = document.getElementById("btn-label");
  btn.disabled = true;
  label.innerHTML = `<span class="loading-dots"><span></span><span></span><span></span></span>`;

  // 結果エリアを隠す
  document.getElementById("result-area").classList.remove("visible");

  const input = `本のタイトル：${title}\n感想：${impression}`;

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ appType: "book-log", input, email: TomuAuth.getEmail() }),
    });

    const data = await res.json();
    if (data.error === "subscription_required" || data.error === "login_required") {
      TomuAuth.showOverlay();
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const quote = data.result || "（結果を取得できませんでした）";

    currentQuote = quote;
    currentBook  = title;

    // 表示
    document.getElementById("result-book-title").textContent = title;
    document.getElementById("result-quote").textContent = quote;
    document.getElementById("result-date").textContent = formatDate(new Date());

    const resultArea = document.getElementById("result-area");
    resultArea.classList.add("visible");
    resultArea.scrollIntoView({ behavior: "smooth", block: "nearest" });

    // 履歴保存
    saveHistory(title, quote);
    renderHistory();
    histSave({title:title,summary:quote.slice(0,80)+(quote.length>80?'…':''),content:quote});
    setTimeout(histLoad,1000);

  } catch (err) {
    alert("エラーが発生しました。しばらくしてから再試行してください。");
    console.error(err);
  } finally {
    btn.disabled = false;
    label.textContent = "Generate — 座右の銘を生成";
  }
}

function resetForm() {
  document.getElementById("result-area").classList.remove("visible");
  document.getElementById("book-title").value = "";
  document.getElementById("book-impression").value = "";
  document.getElementById("book-title").focus();
}

function copyQuote() {
  const text = `「${currentBook}」より\n${currentQuote}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(".btn-copy");
    const orig = btn.textContent;
    btn.textContent = "Copied ✓";
    setTimeout(() => btn.textContent = orig, 1800);
  }).catch(() => {
    alert("クリップボードへのコピーに失敗しました");
  });
}

// ===== 履歴 =====
function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  } catch { return []; }
}

function saveHistory(book, quote) {
  const history = loadHistory();
  history.unshift({ book, quote, date: new Date().toISOString() });
  // 最大20件
  if (history.length > 20) history.pop();
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function clearHistory() {
  if (!confirm("読書録をすべて削除しますか？")) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function renderHistory() {
  const history = loadHistory();
  const section = document.getElementById("history-section");
  const list    = document.getElementById("history-list");

  if (history.length === 0) {
    section.style.display = "none";
    return;
  }

  section.style.display = "block";
  list.innerHTML = history.map(item => `
    <div class="history-item">
      <div class="history-book">📖 ${escapeHtml(item.book)}</div>
      <div class="history-quote">${escapeHtml(item.quote)}</div>
      <div class="history-meta">${formatDate(new Date(item.date))}</div>
    </div>
  `).join("");
}

function formatDate(d) {
  return d.toLocaleDateString("ja-JP", { year:"numeric", month:"long", day:"numeric" });
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Enter送信（タイトルフィールド）
document.getElementById("book-title").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    document.getElementById("book-impression").focus();
  }
});

// 初期化
renderHistory();

async function callMystic(tool, args) {
  const MYSTIC_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev/mystic-bridge';
  const btn = document.querySelector('.btn-mystic');
  const wrap = document.getElementById('mystic-result');
  btn.disabled = true;
  btn.textContent = '✨ 星々に問いかけています…';
  wrap.innerHTML = '<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC</div>星々があなたのために語ります...</div>';
  try {
    const res = await fetch(MYSTIC_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ tool: tool, arguments: args })
    });
    const data = await res.json();
    const msg = (data.content && data.content[0] && data.content[0].text) || '占い結果を取得できませんでした。';
    const safe = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    wrap.innerHTML = `<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC より</div>${safe}</div>`;
  } catch(e) {
    wrap.innerHTML = '<div class="mystic-result-card">⚠ 星々との通信が途絶えました。しばらくしてからお試しください。</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ MYSTICで占う';
  }
}
</script>

<div id="hist-modal" class="hist-modal-overlay" style="display:none;" onclick="histClose(event)">
  <div class="hist-modal" onclick="event.stopPropagation()">
    <div class="hist-modal-hdr">
      <div style="flex:1"><div class="hist-modal-date" id="hist-modal-date"></div><div class="hist-modal-title" id="hist-modal-title"></div><div class="hist-modal-meta" id="hist-modal-meta"></div></div>
      <button class="hist-modal-close" onclick="histClose()">✕</button>
    </div>
    <div class="hist-modal-body" id="hist-modal-body"></div>
  </div>
</div>
<script>
(function(){
const A='book-log',W='https://orange-sound-354b.inverted-triangle-leef.workers.dev';
let _s=[];
function _isFull(){return !!(window.TomuAuth&&TomuAuth.getPlan&&TomuAuth.getPlan()==='full');}
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.histLoad=async function(){if(!_isFull()){const sec=document.getElementById('hist-section');if(sec)sec.style.display='none';return;}const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?app_id='+A+'&limit=5',{headers:{'X-Customer-Email':em}});const d=await r.json();_s=d.sessions||[];histRender(_s);}catch(x){}};
window.histRender=function(ss){const sec=document.getElementById('hist-section');const li=document.getElementById('hist-list');if(!sec||!li)return;if(!_isFull()){sec.style.display='none';return;}if(!ss.length){li.innerHTML='<p class="hist-empty">まだ履歴がありません</p>';sec.style.display='';return;}li.innerHTML=ss.map((s,i)=>{const sd=s.session_data||{},dt=new Date(s.created_at).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});return'<div class="hist-card" onclick="histOpen('+i+')"><div class="hist-card-meta"><span class="hist-card-date">'+dt+'</span><button class="hist-del" onclick="event.stopPropagation();histDel(\''+_e(s.id)+'\')">🗑</button></div><div class="hist-card-title">'+_e(sd.title||'—')+'</div>'+(sd.summary?'<div class="hist-card-summary">'+_e(sd.summary)+'</div>':'')+'</div>';}).join('');sec.style.display='';};
window.histOpen=function(i){const s=_s[i];if(!s)return;const sd=s.session_data||{};document.getElementById('hist-modal-date').textContent=new Date(s.created_at).toLocaleDateString('ja-JP',{year:'numeric',month:'numeric',day:'numeric'});document.getElementById('hist-modal-title').textContent=sd.title||'—';document.getElementById('hist-modal-meta').textContent=sd.meta||'';document.getElementById('hist-modal-body').textContent=sd.content||'';document.getElementById('hist-modal').style.display='flex';document.body.style.overflow='hidden';};
window.histClose=function(e){if(e&&e.target!==document.getElementById('hist-modal'))return;document.getElementById('hist-modal').style.display='none';document.body.style.overflow='';};
window.histDel=async function(id){if(!id||!confirm('この履歴を削除しますか？'))return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?id='+encodeURIComponent(id),{method:'DELETE',headers:{'X-Customer-Email':em}});if(r.ok)await histLoad();else alert('削除に失敗しました。');}catch(x){alert('通信エラー');}};
window.histSave=async function(d){if(!_isFull())return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{await fetch(W+'/api/history',{method:'POST',headers:{'Content-Type':'application/json','X-Customer-Email':em},body:JSON.stringify({app_id:A,session_data:d})});}catch(x){}};
document.addEventListener('DOMContentLoaded',function(){setTimeout(histLoad,800);});
document.addEventListener('tomu:unlocked',function(){setTimeout(histLoad,300);});
})();
</script>
