<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>褒め褒め鏡</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(145deg,#f5f0ff 0%,#fdf4f0 40%,#fff8f4 70%,#f8f4ff 100%);display:flex;align-items:center;justify-content:center;font-family:'Zen Kaku Gothic New',sans-serif;padding:24px 16px;position:relative;overflow-x:hidden}
.orb{position:absolute;border-radius:50%;pointer-events:none}
.orb1{top:-80px;left:-60px;width:320px;height:320px;background:radial-gradient(circle,rgba(220,190,255,0.35) 0%,transparent 70%);animation:pulse 6s ease-in-out infinite}
.orb2{bottom:-60px;right:-40px;width:280px;height:280px;background:radial-gradient(circle,rgba(255,210,190,0.4) 0%,transparent 70%);animation:pulse 8s ease-in-out infinite 2s}
.container{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:28px;position:relative;z-index:1}
.header{text-align:center;animation:fadeUp 0.8s ease-out}
.mirror-icon{font-size:48px;display:block;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(180,130,200,0.4))}
h1{font-family:'Shippori Mincho',serif;font-size:32px;font-weight:600;background:linear-gradient(135deg,#c878c0 0%,#e8a060 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.06em;margin-bottom:8px}
.subtitle{font-size:14px;color:#b09ab8;letter-spacing:0.08em;font-weight:300}
.mirror{width:100%;background:rgba(255,252,255,0.75);backdrop-filter:blur(20px);border-radius:24px;border:1.5px solid rgba(220,190,240,0.5);padding:32px 28px;box-shadow:0 8px 40px rgba(180,130,200,0.15),inset 0 1px 0 rgba(255,255,255,0.8);position:relative;overflow:hidden;animation:fadeUp 0.8s ease-out 0.2s both}
.shimmer{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.4) 50%,transparent 60%);animation:shimmer 4s ease-in-out infinite;pointer-events:none}
.label{font-family:'Shippori Mincho',serif;font-size:15px;color:#a88ab0;margin-bottom:16px;letter-spacing:0.04em}
textarea{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid rgba(210,170,230,0.5);background:rgba(252,248,255,0.8);font-size:14px;color:#5a4060;line-height:1.7;font-family:'Zen Kaku Gothic New',sans-serif;resize:none;outline:none;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:16px}
textarea:focus{border-color:#d4a0c8;box-shadow:0 0 0 3px rgba(212,160,200,0.2)}
textarea::placeholder{color:#c4a8c0;font-style:italic}
.btn{width:100%;padding:14px 24px;border-radius:50px;border:none;background:linear-gradient(135deg,#d4a0c8 0%,#e8b890 100%);color:white;font-size:15px;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;letter-spacing:0.06em;cursor:pointer;box-shadow:0 4px 20px rgba(212,160,200,0.4);transition:opacity 0.2s}
.btn:disabled{background:linear-gradient(135deg,#d8c8d8 0%,#e8d8c8 100%);box-shadow:none;cursor:not-allowed}
.praise-section{animation:fadeUp 0.6s ease-out}
.praise-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.praise-label{font-size:13px;color:#c08ab0;letter-spacing:0.1em;font-weight:700}
.praise-text{font-family:'Shippori Mincho',serif;font-size:15px;color:#5a4060;line-height:1.9;letter-spacing:0.03em;margin-bottom:20px}
.reset-btn{display:block;margin:0 auto;padding:10px 28px;border-radius:50px;border:1.5px solid rgba(210,170,230,0.6);background:transparent;color:#b090c0;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;cursor:pointer;letter-spacing:0.06em}
.btn-mystic{width:100%;background:linear-gradient(135deg,#1a0533,#0d1f3c);color:#d4af37;border:1px solid #d4af37;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;transition:opacity 0.2s,transform 0.1s;font-family:inherit;letter-spacing:0.05em;margin-top:8px;}
.btn-mystic:hover{opacity:0.85;transform:translateY(-1px);}
.btn-mystic:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.mystic-result-card{margin-top:12px;background:linear-gradient(135deg,rgba(26,5,51,0.95),rgba(13,31,60,0.95));border:1px solid rgba(212,175,55,0.4);border-radius:8px;padding:18px 20px;color:#e8d5a3;font-size:0.88rem;line-height:1.9;white-space:pre-wrap;max-height:none;overflow:visible;}
.mystic-result-label{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:#d4af37;margin-bottom:10px;}
.footer{font-size:12px;color:#c4aac8;letter-spacing:0.1em;animation:fadeUp 0.8s ease-out 0.4s both}
.hidden{display:none}
@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
@keyframes shimmer{0%{transform:translateX(-100%) skewX(-15deg)}100%{transform:translateX(300%) skewX(-15deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ===== Supabase 履歴 ===== */
.hist-section{margin:12px 0;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.4);border:1px solid rgba(0,0,0,0.06);}.hist-list{display:flex;flex-direction:column;gap:7px;margin-top:7px;}.hist-card{padding:10px 12px;border-radius:9px;background:rgba(255,255,255,0.6);border:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:background 0.2s;}.hist-card:hover{background:rgba(255,255,255,0.9);}.hist-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;}.hist-card-date{font-size:0.66rem;font-family:monospace;opacity:0.5;}.hist-card-title{font-size:0.87rem;font-weight:600;margin-bottom:2px;}.hist-card-summary{font-size:0.75rem;opacity:0.6;line-height:1.45;}.hist-del{margin-left:auto;background:none;border:none;font-size:0.9rem;cursor:pointer;opacity:0.28;transition:opacity 0.2s;padding:1px 4px;border-radius:4px;}.hist-del:hover{opacity:1;}.hist-empty{font-size:0.75rem;opacity:0.45;font-family:monospace;text-align:center;padding:12px 0;}.hist-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}.hist-modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.2);}.hist-modal-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(0,0,0,0.08);}.hist-modal-date{font-size:0.66rem;font-family:monospace;opacity:0.52;margin-bottom:3px;}.hist-modal-title{font-size:1.13rem;font-weight:700;}.hist-modal-meta{font-size:0.7rem;opacity:0.48;margin-top:3px;}.hist-modal-close{margin-left:auto;background:none;border:1px solid rgba(0,0,0,0.12);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:0.84rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}.hist-modal-close:hover{background:rgba(0,0,0,0.08);}.hist-modal-body{font-size:0.87rem;line-height:1.85;white-space:pre-wrap;}
</style>
  <script src="/tomu-system/common/header.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#6c63ff">
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script></head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="container">
  <div class="header">
    <span class="mirror-icon">🪞</span>
    <h1>褒め褒め鏡</h1>
    <p class="subtitle">今日の自分を、鏡に映してみて</p>
  </div>
  <div class="mirror">
    <div class="shimmer"></div>
    <div id="input-section">
      <p class="label">今日のあなたを、少し聞かせて</p>
      <textarea id="userInput" rows="4" placeholder="今日も一日頑張りました。特に難しかったことに取り組んで、少し自信がつきました。"></textarea>
      <button class="btn" id="praiseBtn" onclick="getPraise()">✨ 鏡に映す</button>
    </div>
    <div id="praise-section" class="praise-section hidden">
      <div class="praise-header"><span>🌸</span><span class="praise-label">鏡からのことば</span></div>
      <p class="praise-text" id="praiseText"></p>
      <!-- MYSTIC -->
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(212,175,55,0.2);">
        <button class="btn-mystic" onclick="callMystic('aura_reading',{current_state: document.getElementById('userInput').value})">✨ MYSTICで占う</button>
        <div id="mystic-result"></div>
      </div>
      <button class="reset-btn" onclick="reset()">もう一度映す</button>
    </div>
  </div>
  <div id="hist-section" class="hist-section" style="display:none;">
    <p style="font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;opacity:0.5;margin-bottom:8px;font-family:monospace;">Past Sessions — 履歴</p>
    <div id="hist-list" class="hist-list"></div>
  </div>
  <p class="footer">あなたの今日を、ちゃんと見ています</p>
</div>
<script>
const WORKER_URL = "https://orange-sound-354b.inverted-triangle-leef.workers.dev";

async function getPraise() {
  const input = document.getElementById("userInput").value.trim();
  if (!input) return;
  const btn = document.getElementById("praiseBtn");
  btn.textContent = "鏡が映している…";
  btn.disabled = true;
  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        appType: "praise",
        input: input,
        email: TomuAuth.getEmail()
      })
    });
    const data = await res.json();
    if (data.error === "subscription_required" || data.error === "login_required") {
      TomuAuth.showOverlay();
      btn.textContent = "✨ 鏡に映す";
      btn.disabled = false;
      return;
    }
    const text = data.result || "あなたは素晴らしいです。✨";
    document.getElementById("praiseText").textContent = text;
    document.getElementById("input-section").classList.add("hidden");
    document.getElementById("praise-section").classList.remove("hidden");
    histSave({title:input.slice(0,30)+(input.length>30?'…':''),summary:text.slice(0,80)+(text.length>80?'…':''),content:text});
    setTimeout(histLoad,1000);
  } catch {
    document.getElementById("praiseText").textContent = "あなたのことを褒めたくて仕方ないのですが、少し調子が悪いみたい。でも、ここまで書いてくれたあなたは、間違いなく素敵な人です。✨";
    document.getElementById("input-section").classList.add("hidden");
    document.getElementById("praise-section").classList.remove("hidden");
  }
}

function reset() {
  document.getElementById("userInput").value = "";
  document.getElementById("praiseBtn").textContent = "✨ 鏡に映す";
  document.getElementById("praiseBtn").disabled = false;
  document.getElementById("input-section").classList.remove("hidden");
  document.getElementById("praise-section").classList.add("hidden");
}

async function callMystic(tool, args) {
  const MYSTIC_URL = 'https://orange-sound-354b.inverted-triangle-leef.workers.dev/mystic-bridge';
  const btn = document.querySelector('.btn-mystic');
  const wrap = document.getElementById('mystic-result');
  btn.disabled = true;
  btn.textContent = '✨ 星々に問いかけています…';
  wrap.innerHTML = '<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC</div>星々があなたのために語ります...</div>';
  try {
    const res = await fetch(MYSTIC_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ tool: tool, arguments: args })
    });
    const data = await res.json();
    const msg = (data.content && data.content[0] && data.content[0].text) || '占い結果を取得できませんでした。';
    const safe = msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    wrap.innerHTML = `<div class="mystic-result-card"><div class="mystic-result-label">✦ MYSTIC より</div>${safe}</div>`;
  } catch(e) {
    wrap.innerHTML = '<div class="mystic-result-card">⚠ 星々との通信が途絶えました。しばらくしてからお試しください。</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ MYSTICで占う';
  }
}
</script>

<div id="hist-modal" class="hist-modal-overlay" style="display:none;" onclick="histClose(event)">
  <div class="hist-modal" onclick="event.stopPropagation()">
    <div class="hist-modal-hdr">
      <div style="flex:1"><div class="hist-modal-date" id="hist-modal-date"></div><div class="hist-modal-title" id="hist-modal-title"></div><div class="hist-modal-meta" id="hist-modal-meta"></div></div>
      <button class="hist-modal-close" onclick="histClose()">✕</button>
    </div>
    <div class="hist-modal-body" id="hist-modal-body"></div>
  </div>
</div>
<script>
(function(){
const A='homehome-kagami',W='https://orange-sound-354b.inverted-triangle-leef.workers.dev';
let _s=[];
function _isFull(){return !!(window.TomuAuth&&TomuAuth.getPlan&&TomuAuth.getPlan()==='full');}
function _e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.histLoad=async function(){if(!_isFull()){const sec=document.getElementById('hist-section');if(sec)sec.style.display='none';return;}const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?app_id='+A+'&limit=5',{headers:{'X-Customer-Email':em}});const d=await r.json();_s=d.sessions||[];histRender(_s);}catch(x){}};
window.histRender=function(ss){const sec=document.getElementById('hist-section');const li=document.getElementById('hist-list');if(!sec||!li)return;if(!_isFull()){sec.style.display='none';return;}if(!ss.length){li.innerHTML='<p class="hist-empty">まだ履歴がありません</p>';sec.style.display='';return;}li.innerHTML=ss.map((s,i)=>{const sd=s.session_data||{},dt=new Date(s.created_at).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});return'<div class="hist-card" onclick="histOpen('+i+')"><div class="hist-card-meta"><span class="hist-card-date">'+dt+'</span><button class="hist-del" onclick="event.stopPropagation();histDel(\''+_e(s.id)+'\')">🗑</button></div><div class="hist-card-title">'+_e(sd.title||'—')+'</div>'+(sd.summary?'<div class="hist-card-summary">'+_e(sd.summary)+'</div>':'')+'</div>';}).join('');sec.style.display='';};
window.histOpen=function(i){const s=_s[i];if(!s)return;const sd=s.session_data||{};document.getElementById('hist-modal-date').textContent=new Date(s.created_at).toLocaleDateString('ja-JP',{year:'numeric',month:'numeric',day:'numeric'});document.getElementById('hist-modal-title').textContent=sd.title||'—';document.getElementById('hist-modal-meta').textContent=sd.meta||'';document.getElementById('hist-modal-body').textContent=sd.content||'';document.getElementById('hist-modal').style.display='flex';document.body.style.overflow='hidden';};
window.histClose=function(e){if(e&&e.target!==document.getElementById('hist-modal'))return;document.getElementById('hist-modal').style.display='none';document.body.style.overflow='';};
window.histDel=async function(id){if(!id||!confirm('この履歴を削除しますか？'))return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{const r=await fetch(W+'/api/history?id='+encodeURIComponent(id),{method:'DELETE',headers:{'X-Customer-Email':em}});if(r.ok)await histLoad();else alert('削除に失敗しました。');}catch(x){alert('通信エラー');}};
window.histSave=async function(d){if(!_isFull())return;const em=window.TomuAuth?window.TomuAuth.getEmail():null;if(!em)return;try{await fetch(W+'/api/history',{method:'POST',headers:{'Content-Type':'application/json','X-Customer-Email':em},body:JSON.stringify({app_id:A,session_data:d})});}catch(x){}};
document.addEventListener('DOMContentLoaded',function(){setTimeout(histLoad,800);});
document.addEventListener('tomu:unlocked',function(){setTimeout(histLoad,300);});
})();
</script>

<!-- とむSYSTEM 共通認証モジュール -->
<script src="../../tomu-login.js"></script>
</body>
</html>
